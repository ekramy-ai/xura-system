<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#03071e">
  <title>XURA Live — Results</title>
  <style>
    /* ── Reset & Tokens ──────────────────────────────────────── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #03071e;
      --bg2: #060d27;
      --bg3: #0a1535;
      --surface: #0f1f3d;
      --surface2: #162447;
      --border: #1a2f57;
      --border2: #243b6a;
      --teal: #5eead4;
      --teal-mid: #0d9488;
      --teal-dark: #134e4a;
      --blue: #60a5fa;
      --blue-mid: #2563eb;
      --blue-dark: #1e3a5f;
      --amber: #fbbf24;
      --amber-dark: #92400e;
      --green: #4ade80;
      --red: #f87171;
      --purple: #a78bfa;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #475569;
      --r: 10px;
      --r2: 16px;
      --r3: 24px;
      --tr: .2s cubic-bezier(.4, 0, .2, 1);
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans Arabic', 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden
    }

    button,
    input,
    select {
      font-family: inherit
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px
    }

    #shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column
    }

    /* ── Nav ────────────────────────────────────────────────── */
    #topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(3, 7, 30, .92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 16px;
      height: 56px;
    }

    .nav-logo {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -.5px;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer
    }

    .nav-tabs {
      display: flex;
      gap: 2px;
      flex: 1;
      justify-content: center
    }

    .nav-tab {
      padding: 7px 12px;
      border-radius: var(--r);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: transparent;
      color: var(--text2);
      transition: var(--tr)
    }

    .nav-tab:hover {
      background: var(--surface);
      color: var(--text)
    }

    .nav-tab.active {
      background: var(--surface2);
      color: var(--teal);
      font-weight: 700
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1.2s ease-in-out infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .live-badge {
      font-size: 11px;
      color: var(--red);
      font-weight: 700;
      letter-spacing: .05em
    }

    .conn-badge {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 600
    }

    .conn-badge.on {
      background: #052e16;
      color: var(--green)
    }

    .conn-badge.off {
      background: #2d1515;
      color: var(--red)
    }

    #lang-toggle {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--teal);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
      letter-spacing: .05em
    }

    #lang-toggle:hover {
      background: var(--surface)
    }

    /* ── Layout ─────────────────────────────────────────────── */
    #main {
      flex: 1;
      padding: 24px 20px;
      max-width: 1280px;
      margin: 0 auto;
      width: 100%
    }

    .view {
      display: none
    }

    .view.active {
      display: block
    }

    .sec-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px
    }

    .sec-hd h2 {
      font-size: 17px;
      font-weight: 700
    }

    .sec-hd small {
      font-size: 12px;
      color: var(--text3)
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px
    }

    /* ── Match Card ─────────────────────────────────────────── */
    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      overflow: hidden;
      cursor: pointer;
      transition: var(--tr);
      position: relative
    }

    .match-card:hover {
      border-color: var(--teal-mid);
      transform: translateY(-2px)
    }

    .match-card.is-live {
      border-color: var(--red);
      border-inline-start: 3px solid var(--red)
    }

    .match-card.is-live::before {
      content: '';
      position: absolute;
      inset-inline: 0;
      top: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--red), transparent);
      animation: shimmer 2s linear infinite
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%)
      }

      100% {
        transform: translateX(100%)
      }
    }

    .mc-header {
      padding: 10px 16px;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .mc-tournament {
      font-size: 11px;
      color: var(--text3);
      font-weight: 500
    }

    .mc-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 700
    }

    .mc-status.live {
      background: #2d1515;
      color: var(--red)
    }

    .mc-status.finished {
      background: var(--surface2);
      color: var(--text3)
    }

    .mc-status.scheduled {
      background: var(--teal-dark);
      color: var(--teal)
    }

    .mc-body {
      padding: 16px
    }

    .mc-clubs {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px
    }

    .mc-club {
      text-align: center;
      flex: 1
    }

    .mc-club-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px
    }

    .mc-score {
      font-size: 44px;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px
    }

    .mc-score.home {
      color: var(--teal)
    }

    .mc-score.away {
      color: var(--blue)
    }

    .mc-divider {
      font-size: 18px;
      color: var(--text3);
      align-self: center;
      padding-bottom: 6px
    }

    .mc-sets {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      margin-top: 4px
    }

    .mc-footer {
      padding: 8px 16px;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border)
    }

    .mc-footer-txt {
      font-size: 11px;
      color: var(--text3)
    }

    @keyframes ring {
      0% {
        box-shadow: 0 0 0 0 rgba(248, 113, 113, .4)
      }

      70% {
        box-shadow: 0 0 0 10px rgba(248, 113, 113, 0)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(248, 113, 113, 0)
      }
    }

    .pulse-ring {
      animation: ring 2s ease-out infinite
    }

    /* ── Match Card Set Details ─────────────────────────────── */
    .mc-scoreboard {
      display: flex;
      flex-direction: column;
      font-size: 12px;
      background: var(--bg2);
      border-top: 1px solid var(--border)
    }

    .mcs-row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border)
    }

    .mcs-row:last-child {
      border-bottom: none
    }

    .mcs-header {
      color: var(--text3);
      font-size: 10px;
      text-transform: uppercase;
      background: var(--bg3)
    }

    .mcs-team {
      flex: 1;
      padding: 8px 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .mcs-set {
      width: 36px;
      text-align: center;
      padding: 8px 0;
      border-inline-start: 1px solid var(--border);
      color: var(--text2);
      font-variant-numeric: tabular-nums
    }

    .mcs-set.active {
      background: rgba(13, 148, 136, .1);
      color: var(--text)
    }

    .mcs-set.won-h {
      color: var(--teal);
      font-weight: 700
    }

    .mcs-set.won-a {
      color: var(--blue);
      font-weight: 700
    }

    .mcs-total {
      width: 46px;
      font-weight: 700;
      color: var(--text)
    }

    .mcs-sets-won {
      font-size: 15px;
      font-weight: 900
    }

    .mcs-sets-won.home {
      color: var(--teal)
    }

    .mcs-sets-won.away {
      color: var(--blue)
    }

    .mc-match-info {
      padding: 8px 16px;
      background: var(--bg3);
      font-size: 11px;
      color: var(--text3);
      text-align: center
    }

    /* ── Detail Hero ─────────────────────────────────────────── */
    .detail-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      overflow: hidden;
      margin-bottom: 20px
    }

    .dh-bar {
      background: var(--bg3);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .dh-tournament {
      font-size: 12px;
      color: var(--text3);
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase
    }

    .dh-score-block {
      padding: 28px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px
    }

    .dh-team {
      text-align: center;
      flex: 1;
      max-width: 200px
    }

    .dh-team-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px
    }

    .dh-score {
      font-size: 96px;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -4px
    }

    .dh-score.home {
      color: var(--teal)
    }

    .dh-score.away {
      color: var(--blue)
    }

    .dh-sep {
      font-size: 40px;
      color: var(--border2);
      font-weight: 200;
      padding-bottom: 12px
    }

    .set-breakdown {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px
    }

    .sb-item {
      flex: 1;
      text-align: center;
      background: var(--bg3);
      border-radius: var(--r);
      padding: 8px;
      border: 1px solid var(--border)
    }

    .sb-item.active {
      border-color: var(--teal-mid)
    }

    .sb-num {
      font-size: 10px;
      color: var(--text3);
      margin-bottom: 4px
    }

    .sb-score {
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums
    }

    /* ── Point Log ───────────────────────────────────────────── */
    .point-log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      overflow: hidden
    }

    .pl-header {
      padding: 12px 16px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .pl-header h3 {
      font-size: 14px;
      font-weight: 600
    }

    .pl-body {
      max-height: 320px;
      overflow-y: auto
    }

    .pl-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      animation: fadeSlide .25s ease;
      font-size: 13px
    }

    .pl-item:last-child {
      border-bottom: none
    }

    @keyframes fadeSlide {
      from {
        transform: translateY(-6px);
        opacity: 0
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .pl-type-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0
    }

    .pl-club {
      font-weight: 600;
      flex: 1
    }

    .pl-score {
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: var(--text3);
      background: var(--bg2);
      padding: 2px 8px;
      border-radius: 6px
    }

    .pl-set {
      font-size: 11px;
      color: var(--text3)
    }

    /* ── Stats ───────────────────────────────────────────────── */
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px
    }

    .stat-label {
      font-size: 12px;
      color: var(--text2)
    }

    .stat-bar-wrap {
      flex: 1;
      margin: 0 10px;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
      position: relative
    }

    .stat-bar {
      height: 100%;
      border-radius: 3px;
      transition: width .6s ease
    }

    .stat-val {
      font-size: 12px;
      font-weight: 600;
      min-width: 24px;
      text-align: start
    }

    /* ── Dashboard ───────────────────────────────────────────── */
    .dash-kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 20px;
      position: relative;
      overflow: hidden
    }

    .kpi::before {
      content: '';
      position: absolute;
      top: -20px;
      inset-inline-start: -20px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      opacity: .06
    }

    .kpi.teal::before {
      background: var(--teal)
    }

    .kpi.blue::before {
      background: var(--blue)
    }

    .kpi.amber::before {
      background: var(--amber)
    }

    .kpi.purple::before {
      background: var(--purple)
    }

    .kpi-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px
    }

    .kpi-val {
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px
    }

    .kpi.teal .kpi-val {
      color: var(--teal)
    }

    .kpi.blue .kpi-val {
      color: var(--blue)
    }

    .kpi.amber .kpi-val {
      color: var(--amber)
    }

    .kpi.purple .kpi-val {
      color: var(--purple)
    }

    .kpi-sub {
      font-size: 11px;
      color: var(--text3)
    }

    .activity-feed {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      overflow: hidden
    }

    .af-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .af-header h3 {
      font-size: 14px;
      font-weight: 700
    }

    .af-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      animation: fadeSlide .3s ease
    }

    .af-item:last-child {
      border-bottom: none
    }

    .af-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px
    }

    .af-text {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
      flex: 1
    }

    .af-time {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap
    }

    .match-control {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      overflow: hidden
    }

    .mc-panel-hdr {
      padding: 14px 18px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .mc-panel-hdr h3 {
      font-size: 14px;
      font-weight: 700
    }

    .status-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 10px;
      font-weight: 700
    }

    .status-tag.live {
      background: #2d1515;
      color: var(--red)
    }

    .status-tag.finished {
      background: var(--surface2);
      color: var(--text3)
    }

    .ref-link {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .ref-link-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--r);
      background: var(--teal-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0
    }

    .ref-link-text {
      flex: 1
    }

    .ref-link-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px
    }

    .ref-link-sub {
      font-size: 11px;
      color: var(--text3)
    }

    .ref-link-pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%
    }

    .ref-link-pulse.active {
      background: var(--green);
      animation: blink 1s infinite
    }

    .ref-link-pulse.inactive {
      background: var(--text3)
    }

    /* ── Standings ───────────────────────────────────────────── */
    .standings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    .standings-table th {
      padding: 10px 14px;
      background: var(--bg3);
      color: var(--text3);
      font-size: 11px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      letter-spacing: .05em
    }

    .standings-table th:first-child,
    .standings-table td:first-child,
    .standings-table td:nth-child(2) {
      text-align: start
    }

    .standings-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: center;
      vertical-align: middle
    }

    .standings-table tr:hover td {
      background: var(--surface2)
    }

    .standings-table tr:last-child td {
      border-bottom: none
    }

    .st-rank {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700
    }

    .st-rank.r1 {
      background: var(--amber-dark);
      color: var(--amber)
    }

    .st-rank.r2 {
      background: #1c2535;
      color: #94a3b8
    }

    .st-rank.r3 {
      background: #1e1510;
      color: #cd7c3e
    }

    .st-rank.rn {
      background: var(--surface2);
      color: var(--text3)
    }

    .st-form {
      display: flex;
      gap: 3px
    }

    .sf-w {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: var(--teal-dark);
      font-size: 8px;
      color: var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700
    }

    .sf-l {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: #2d1515;
      font-size: 8px;
      color: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700
    }

    /* ── Schedule ─────────────────────────────────────────── */
    .schedule-group { margin-bottom: 28px }
    .schedule-group-title { font-size: 12px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border) }
    .sch-card { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 14px 18px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 16px; cursor: pointer;
      transition: var(--tr) }
    .sch-card:hover { border-color: var(--teal-mid); transform: translateX(4px) }
    .sch-card.is-live { border-inline-start: 3px solid var(--red) }
    .sch-card.is-done { opacity: .7 }
    .sch-teams { flex: 1; font-size: 14px; font-weight: 700 }
    .sch-meta { font-size: 11px; color: var(--text3); margin-top: 3px }
    .sch-score { font-size: 22px; font-weight: 900; font-variant-numeric: tabular-nums;
      letter-spacing: -1px; text-align: center; min-width: 60px }
    .sch-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700 }

        <!-- Point Types Breakdown -->

        </div>
      </div>

    </div>
  </div>

  <div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
background:var(--surface2);color:var(--text);padding:10px 22px;border-radius:24px;
font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;
border:1px solid var(--border2)"></div>

    const browserLang = (navigator.language || 'en').toLowerCase()
    let LANG = browserLang.startsWith('ar') ? 'ar' : 'en'
    const saved = localStorage.getItem('xura_lang')
    if (saved === 'ar' || saved === 'en') LANG = saved
    const T = () => I18N[LANG]

    function applyDir() {
      document.documentElement.lang = LANG
      document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr'
      if (document.getElementById('lang-toggle')) {
        document.getElementById('lang-toggle').textContent = LANG === 'ar' ? 'EN' : 'عر'
      }
      // Wire print button label
      const printBtnEl = document.getElementById('print-btn')
      if (printBtnEl) printBtnEl.textContent = T().printScoresheet
    }

    function toggleLang() {
      LANG = LANG === 'ar' ? 'en' : 'ar'
      localStorage.setItem('xura_lang', LANG)
      applyDir()
      updateStaticText()
      pollReferee()
      renderStandings()
      renderSchedule()
      renderPlayerStats()
      if (APP.currentView === 'detail') renderDetail(APP.lastRenderedMatch)
    }

    function updateStaticText() {
      const tr = T()
      document.getElementById('tab-home').textContent = tr.navMatches
      document.getElementById('tab-standings').textContent = tr.navStandings
      document.getElementById('tab-schedule').textContent = tr.navSchedule
      document.getElementById('tab-stats').textContent = tr.navStats
      document.getElementById('detail-tab').textContent = tr.navDetail
      document.getElementById('tab-dashboard').textContent = tr.navDashboard
      document.getElementById('home-title').textContent = tr.homeTitle
      document.getElementById('upcoming-title').textContent = tr.upcomingTitle
      document.getElementById('live-empty-txt').textContent = tr.noLive
      document.getElementById('standings-title').textContent = tr.standings
      document.getElementById('detail-back').textContent = tr.backBtn
      document.getElementById('log-title-d').textContent = tr.detailLogTitle
      document.getElementById('kpi-live-lbl').textContent = tr.kpiLiveLbl
      document.getElementById('kpi-live-sub').textContent = tr.kpiLiveSub
      document.getElementById('kpi-pts-lbl').textContent = tr.kpiPtsLbl
      document.getElementById('kpi-pts-sub').textContent = tr.kpiPtsSub
      document.getElementById('kpi-sets-lbl').textContent = tr.kpiSetsLbl
      document.getElementById('kpi-sets-sub').textContent = tr.kpiSetsSub
      document.getElementById('kpi-refs-lbl').textContent = tr.kpiRefsLbl
      document.getElementById('kpi-refs-sub').textContent = tr.kpiRefsSub
      document.getElementById('dash-active-title').textContent = tr.dashActiveTitle
      document.getElementById('dash-no-match').textContent = tr.dashNoMatch
      document.getElementById('type-breakdown-title').textContent = tr.typeBreakdownTitle
      document.getElementById('ref-link-title-top').textContent = tr.refLinkTitle
      document.getElementById('ref-link-hint').innerHTML = tr.refHint
      document.getElementById('feed-title').textContent = tr.feedTitle
      document.getElementById('feed-empty').textContent = tr.feedEmpty
      document.getElementById('detail-loading-txt').textContent = tr.detailLoading
      document.getElementById('detail-nomatch-txt').textContent = tr.detailNoMatch
      document.getElementById('detail-nomatch-btn').textContent = tr.detailNoMatchBtn
      // Update filter placeholders
      const tourSel = document.getElementById('standings-tournament-filter')
      const genSel = document.getElementById('standings-gender-filter')
      const ageSel = document.getElementById('standings-agegroup-filter')
      if (tourSel) tourSel.options[0].textContent = tr.standingsAllTournaments
      if (genSel) genSel.options[0].textContent = tr.standingsAllGenders
      if (ageSel) ageSel.options[0].textContent = tr.standingsAllAge
      const loadTxt = document.getElementById('standings-loading-txt')
      if (loadTxt) loadTxt.textContent = tr.standingsLoading
    }

    /* ── Point Types ─────────────────────────────────────────── */
    const PT_META = {
      point: { icon: '⊕', color: '#5eead4', bg: '#134e4a' },
      attack: { icon: '▲', color: '#f97316', bg: '#431407' },
      serve_ace: { icon: '◎', color: '#facc15', bg: '#422006' },
      block: { icon: '■', color: '#38bdf8', bg: '#0c1a3a' },
      opponent_error: { icon: '✕', color: '#f87171', bg: '#3b0764' },
      dig: { icon: '↙', color: '#4ade80', bg: '#052e16' },
      other: { icon: '●', color: '#94a3b8', bg: '#0f172a' },
    }
    const ptLabel = (id) => T().pointTypes[id] || id

    /* ── URL Params ─────────────────────────────────────────────*/
    const URL_MATCH_ID = new URLSearchParams(window.location.search).get('matchId')

    /* ── App State ───────────────────────────────────────────── */
    const APP = {
      currentView: 'home',
      refereeData: null,
      activityFeed: [],
      lastEventCount: 0,
      pollInterval: null,
      selectedMatchId: null,
      unsubscribeMatch: null,
      lastRenderedMatch: null,
    }

    let matchData = null
    window.eventsData = []
    window.lastHeartbeat = null
    window.historyMatches = []
    window.currentLiveMatches = []

    /* ── Navigation ──────────────────────────────────────────── */
    function navigate(view, data = null) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'))
      const el = document.getElementById(`view-${view}`)
      if (!el) return
      el.classList.add('active')
      APP.currentView = view
      const tab = document.querySelector(`[data-view="${view}"]`)
      if (tab) tab.classList.add('active')

      if (view === 'detail') {
        document.getElementById('detail-tab').style.display = 'flex'
        const matchId = (typeof data === 'string' ? data : null) || APP.selectedMatchId || URL_MATCH_ID

        if (!matchId) {
          showDetailState('nomatch')
          return
        }

        if (matchId !== APP.selectedMatchId) {
          if (APP.unsubscribeMatch) {
            APP.unsubscribeMatch()
            APP.unsubscribeMatch = null
          }
          window.eventsData = []
          window.lastHeartbeat = null
          matchData = null
          APP.selectedMatchId = matchId
          APP.lastRenderedMatch = null
          APP.lastEventCount = 0

          showDetailState('loading')
          APP.unsubscribeMatch = listenToMatch(matchId)
        } else {
          if (APP.lastRenderedMatch) renderDetail(APP.lastRenderedMatch)
          else showDetailState('loading')
        }
      } else {
        document.getElementById('detail-tab').style.display = 'none'
      }

      if (view === 'standings') renderStandings()
      if (view === 'schedule')  renderSchedule()
      if (view === 'stats')     renderPlayerStats()
      if (view === 'dashboard') renderDashboard()
    }

    function showDetailState(state) {
      document.getElementById('detail-loading').style.display = state === 'loading' ? 'block' : 'none'
      document.getElementById('detail-nomatch').style.display = state === 'nomatch' ? 'block' : 'none'
      document.getElementById('detail-content').style.display = state === 'content' ? 'block' : 'none'
    }

    document.querySelectorAll('.nav-tab').forEach(t => {
      if (t.dataset.view) t.addEventListener('click', () => navigate(t.dataset.view))
    })

    function isConnected() {
      if (!APP.selectedMatchId && !URL_MATCH_ID) return false
      return !!(window.lastHeartbeat && Date.now() - parseInt(window.lastHeartbeat) < 20000)
    }

    function buildMatch(data) {
      if (!data) return null
      const events = (data.events || []).filter(e => !e.undone)
      const setMap = {}
      if (data.setScores && Array.isArray(data.setScores)) {
        data.setScores.forEach(s => {
          setMap[s.num] = {
            num: s.num, homeScore: s.home, awayScore: s.away,
            finished: s.finished || false, winner: s.finished ? (s.home > s.away ? 'home' : 'away') : null
          }
        })
      }
      events.forEach(e => {
        const sn = e.set_num || 1
        if (!setMap[sn]) setMap[sn] = { num: sn, homeScore: 0, awayScore: 0, finished: false, winner: null }
        if (e.home_score_after > setMap[sn].homeScore) setMap[sn].homeScore = e.home_score_after
        if (e.away_score_after > setMap[sn].awayScore) setMap[sn].awayScore = e.away_score_after
      })
      const curSetNum = data.currentSetNum || 1
      if (!setMap[curSetNum]) {
        setMap[curSetNum] = { num: curSetNum, homeScore: data.currentHomeScore || 0, awayScore: data.currentAwayScore || 0, finished: false, winner: null }
      } else {
        if (data.currentHomeScore !== undefined) setMap[curSetNum].homeScore = data.currentHomeScore
        if (data.currentAwayScore !== undefined) setMap[curSetNum].awayScore = data.currentAwayScore
      }
      const sets = Object.values(setMap).sort((a, b) => a.num - b.num)
      let homeSets = 0, awaySets = 0
      sets.forEach(s => {
        const limit = s.num < 5 ? 25 : 15
        if (Math.max(s.homeScore, s.awayScore) >= limit && Math.abs(s.homeScore - s.awayScore) >= 2) {
          if (s.homeScore > s.awayScore) homeSets++; else awaySets++
          s.finished = true; s.winner = s.homeScore > s.awayScore ? 'home' : 'away'
        }
      })
      const cur = sets.find(s => !s.finished) || sets[sets.length - 1]
      const last = events.length > 0 ? events[events.length - 1] : null
      return {
        id: data.id || 'match-live',
        tournament: data.tournament || (LANG === 'ar' ? 'مباراة مباشرة' : 'Live Match'),
        homeClub: data.homeClub || data.home || { name_ar: 'Home', name_en: 'Home', color: '#14b8a6' },
        awayClub: data.awayClub || data.away || { name_ar: 'Away', name_en: 'Away', color: '#3b82f6' },
        homeSets: data.homeSets !== undefined ? data.homeSets : homeSets,
        awaySets: data.awaySets !== undefined ? data.awaySets : awaySets,
        currentHomeScore: data.currentHomeScore !== undefined ? data.currentHomeScore : (cur?.homeScore || 0),
        currentAwayScore: data.currentAwayScore !== undefined ? data.currentAwayScore : (cur?.awayScore || 0),
        currentSetNum: data.currentSetNum !== undefined ? data.currentSetNum : (cur?.num || 1),
        sets, events,
        status: data.status || ((homeSets === 3 || awaySets === 3) ? 'finished' : 'live'),
        lastUpdate: last?.recorded_at || data.lastUpdate || new Date().toISOString(),
        refereeName: data.refereeName || ''
      }
    }

    function pollReferee() {
      const match = matchData ? buildMatch({ ...matchData, events: window.eventsData }) : null
      const connected = isConnected()
      APP.refereeData = match ? { events: window.eventsData } : null
      const badge = document.getElementById('conn-badge')
      badge.className = `conn-badge ${connected ? 'on' : 'off'}`
      badge.textContent = connected ? T().connOn : T().connOff
      const pulse = document.getElementById('ref-pulse')
      if (pulse) {
        pulse.className = `ref-link-pulse ${connected ? 'active' : 'inactive'}`
        const sub = document.getElementById('ref-link-sub')
        if (sub) sub.textContent = connected ? T().refConnected : T().refDisconnected
      }
      if (match && window.eventsData.length > APP.lastEventCount) {
        window.eventsData.slice(APP.lastEventCount).forEach(e => {
          const pt = PT_META[e.point_type] || PT_META.other
          const club = e.scoring_side === 'home' ? match.homeClub : match.awayClub
          const sName = LANG === 'ar' ? (club.name_ar || club.name_en) : (club.name_en || club.name_ar)
          const pNum = e.player_num ? ` #${e.player_num}` : ''
          APP.activityFeed.unshift({
            text: `${sName}${pNum} — ${ptLabel(e.point_type)} · ${e.home_score_after}:${e.away_score_after}`,
            color: pt.color,
            time: new Date(e.recorded_at).toLocaleTimeString(LANG === 'ar' ? 'ar' : 'en', { hour: '2-digit', minute: '2-digit' }),
          })
          if (APP.activityFeed.length > 30) APP.activityFeed.pop()
        })
        APP.lastEventCount = window.eventsData.length
      }
      if (APP.currentView === 'detail' && match) renderDetail(match)
      if (APP.currentView === 'dashboard' && match) renderDashboard(match)
      if (match) {
        const d = new Date(match.lastUpdate)
        const el = document.getElementById('last-update-txt')
        if (el) el.textContent = T().lastUpdate(d.toLocaleTimeString(LANG === 'ar' ? 'ar' : 'en', { hour: '2-digit', minute: '2-digit', second: '2-digit' }))
      }
    }

    function renderHome(matchesInput) {
      const liveCards = document.getElementById('live-cards')
      const liveEl = document.getElementById('live-empty')
      let matches = Array.isArray(matchesInput) ? matchesInput : (matchesInput ? [matchesInput] : [])
      if (matches.length > 0) {
        if (liveEl) liveEl.style.display = 'none'
        liveCards.innerHTML = matches.map(m => matchCardHTML(m, true)).join('')
      } else {
        if (liveEl) liveEl.style.display = 'block'
        liveCards.innerHTML = `<div class="empty"><div class="big">⚡</div><p>${T().noLive}</p></div>`
      }
      document.getElementById('upcoming-title').textContent = T().upcomingTitle
      const historyCards = document.getElementById('upcoming-cards')
      const history = window.historyMatches || []
      if (history.length > 0) {
        historyCards.innerHTML = history.slice().reverse().map(h => {
          const built = buildMatch(h)
          if (!built) return ''
          return matchCardHTML(built, false)
        }).filter(Boolean).join('')
      } else {
        historyCards.innerHTML = `<div class="empty" style="grid-column:1/-1;padding:40px"><div class="big">📅</div><p>${LANG === 'ar' ? 'لا توجد مباريات سابقة' : 'No past matches'}</p></div>`
      }
    }

    function matchCardHTML(m, isLive) {
      if (!m) return ''
      const tr = T()
      const statusLabel = m.status === 'live' ? tr.statusLive : m.status === 'finished' ? tr.statusFinished : tr.statusScheduled
      const hName = LANG === 'ar' ? (m.homeClub?.name_ar || 'Home') : (m.homeClub?.name_en || 'Home')
      const aName = LANG === 'ar' ? (m.awayClub?.name_ar || 'Away') : (m.awayClub?.name_en || 'Away')
      let hTotal = 0, aTotal = 0
      const setsHTML = [1, 2, 3, 4, 5].map(i => {
        const s = m.sets.find(x => x.num === i)
        if (s) { hTotal += s.homeScore; aTotal += s.awayScore }
        const hCls = (s && s.winner === 'home' ? 'won-h' : '') + (s && !s.finished && s.num === m.currentSetNum ? ' active' : '')
        const aCls = (s && s.winner === 'away' ? 'won-a' : '') + (s && !s.finished && s.num === m.currentSetNum ? ' active' : '')
        return {
          h: `<div class="mcs-set ${hCls}">${s ? s.homeScore : '-'}</div>`,
          a: `<div class="mcs-set ${aCls}">${s ? s.awayScore : '-'}</div>`
        }
      })
      const scoreboardHTML = `<div class="mc-scoreboard"><div class="mcs-row mcs-header"><div class="mcs-team">${tr.setsLabel || 'SETS'}</div>${[1, 2, 3, 4, 5].map(i => `<div class="mcs-set">${i}</div>`).join('')}<div class="mcs-set mcs-total">T</div></div><div class="mcs-row"><div class="mcs-team">${hName} <span class="mcs-sets-won home">${m.homeSets}</span></div>${setsHTML.map(x => x.h).join('')}<div class="mcs-set mcs-total">${hTotal}</div></div><div class="mcs-row"><div class="mcs-team">${aName} <span class="mcs-sets-won away">${m.awaySets}</span></div>${setsHTML.map(x => x.a).join('')}<div class="mcs-set mcs-total">${aTotal}</div></div></div>`
      const lastEvt = m.events[m.events.length - 1]
      const lastInfo = lastEvt ? `${tr.set(m.currentSetNum)} · ${tr.pts(m.events.length)}` : ''
      return `<div class="match-card ${isLive ? 'is-live pulse-ring' : ''}" onclick="navigate('detail','${m.id}')" style="padding:0"><div class="mc-header"><span class="mc-tournament">${m.tournament}</span><span class="mc-status ${m.status}">${statusLabel}</span></div>${scoreboardHTML}<div class="mc-match-info" style="display:flex;justify-content:space-between;padding:8px 16px"><span>${m.refereeName ? '👤 ' + m.refereeName : ''}</span><span>${lastInfo}</span></div></div>`
    }

    function renderDetail(m) {
      if (m) APP.lastRenderedMatch = m
      if (!APP.selectedMatchId && !URL_MATCH_ID) {
        showDetailState('nomatch')
        return
      }
      if (!m) {
        showDetailState('loading')
        return
      }
      showDetailState('content')
      const tr = T()
      const hClub = m.homeClub || {}
      const aClub = m.awayClub || {}
      const hName = LANG === 'ar' ? (hClub.name_ar || hClub.name_en || 'Home') : (hClub.name_en || hClub.name_ar || 'Home')
      const aName = LANG === 'ar' ? (aClub.name_ar || aClub.name_en || 'Away') : (aClub.name_en || aClub.name_ar || 'Away')
      const hColor = hClub.color || 'var(--teal)'
      const aColor = aClub.color || 'var(--blue)'
      document.documentElement.style.setProperty('--teal', hColor)
      document.documentElement.style.setProperty('--blue', aColor)
      document.getElementById('d-tournament').textContent = m.tournament
      document.getElementById('d-home-name').textContent = hName
      document.getElementById('d-away-name').textContent = aName
      document.getElementById('d-home-score').textContent = m.currentHomeScore
      document.getElementById('d-away-score').textContent = m.currentAwayScore
      const sb = document.getElementById('d-status-badge')
      sb.textContent = m.status === 'live' ? tr.matchLive : tr.matchFinished
      sb.style.color = m.status === 'live' ? 'var(--red)' : 'var(--text3)'
      document.getElementById('d-set-breakdown').innerHTML = m.sets.map(s => {
        const cls = !s.finished ? 'active' : s.winner === 'home' ? 'won-home' : 'won-away'
        return `<div class="sb-item ${cls}"><div class="sb-num">${tr.set(s.num)}</div><div class="sb-score" style="color:${!s.finished ? 'var(--text)' : s.winner === 'home' ? hColor : aColor}">${s.homeScore}–${s.awayScore}</div></div>`
      }).join('')
      const events = m.events
      const hEvt = events.filter(e => e.scoring_side === 'home')
      const aEvt = events.filter(e => e.scoring_side === 'away')
      const tot = events.length || 1
      document.getElementById('detail-stats-wrap').innerHTML = `<div class="card" style="padding:16px"><div style="font-size:13px;font-weight:700;margin-bottom:14px">${tr.statsTitle}</div>${statRow(tr.detailLogTitle, hEvt.length, aEvt.length, tot)}${Object.keys(PT_META).map(id => {
        const h = hEvt.filter(e => e.point_type === id).length
        const a = aEvt.filter(e => e.point_type === id).length
        const pt = PT_META[id]
        return statRow(`${pt.icon} ${ptLabel(id)}`, h, a, tot, pt.color)
      }).join('')}</div><div class="card" style="padding:16px"><div style="font-size:13px;font-weight:700;margin-bottom:14px">${tr.statsCurrentSet}</div><div style="display:flex;flex-direction:column;gap:10px"><div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:${hColor}">${hName}</span><span style="font-weight:700;font-variant-numeric:tabular-nums">${m.currentHomeScore} : ${m.currentAwayScore}</span><span style="color:${aColor}">${aName}</span></div><div style="font-size:12px;color:var(--text3)">${tr.set(m.currentSetNum)}</div><div style="height:1px;background:var(--border);margin:4px 0"></div><div style="font-size:12px;color:var(--text2)">${tr.setsWon}</div><div style="display:flex;justify-content:space-between;font-size:20px;font-weight:700"><span style="color:${hColor}">${m.homeSets}</span><span style="color:var(--text3)">${LANG === 'ar' ? 'أشواط' : 'sets'}</span><span style="color:${aColor}">${m.awaySets}</span></div></div></div>`
      document.getElementById('pl-count').textContent = tr.pts(events.length)
      document.getElementById('log-title-d').textContent = tr.detailLogTitle
      const logBody = document.getElementById('point-log-body')
      const visible = [...events].reverse().slice(0, 50)
      if (!visible.length) {
        logBody.innerHTML = `<div style="padding:20px;text-align:center;font-size:13px;color:var(--text3)">${tr.detailNoPts}</div>`
        return
      }
      logBody.innerHTML = visible.map(e => {
        const pt = PT_META[e.point_type] || PT_META.other
        const club = e.scoring_side === 'home' ? hClub : aClub
        const sName = LANG === 'ar' ? (club.name_ar || club.name_en || '?') : (club.name_en || club.name_ar || '?')
        const sColor = club.color || (e.scoring_side === 'home' ? 'var(--teal)' : 'var(--blue)')
        const pNum = e.player_num ? `<span style="font-size:11px;color:var(--text3);font-weight:400"> #${e.player_num}</span>` : ''
        return `<div class="pl-item"><div class="pl-type-icon" style="background:${pt.bg}"><span style="color:${pt.color}">${pt.icon}</span></div><span class="pl-club" style="color:${sColor}">${sName}${pNum}</span><span class="pl-set">${tr.set(e.set_num)}</span><span class="pl-score">${e.home_score_after} — ${e.away_score_after}</span></div>`
      }).join('')
    }

    function statRow(label, home, away, total, color = '#5eead4') {
      const hp = Math.round((home / total) * 100), ap = Math.round((away / total) * 100)
      return `<div class="stat-row"><span class="stat-label" style="min-width:90px">${label}</span><span class="stat-val" style="color:var(--teal);min-width:20px;text-align:end">${home}</span><div class="stat-bar-wrap"><div style="display:flex;height:100%"><div class="stat-bar" style="width:${hp}%;background:var(--teal);border-radius:3px 0 0 3px"></div><div class="stat-bar" style="width:${ap}%;background:var(--blue);border-radius:0 3px 3px 0"></div></div></div><span class="stat-val" style="color:var(--blue);min-width:20px">${away}</span></div>`
    }

    function renderDashboard(matchArg) {

      document.getElementById('kpi-pts').textContent = events.length
      document.getElementById('kpi-refs').textContent = connected ? 1 : 0

      document.getElementById('kpi-sets').textContent = fins
      const mList = document.getElementById('dash-matches-list')
      document.getElementById('dash-active-count').textContent = m ? (m.status === 'live' ? (LANG === 'ar' ? '1 مباراة حية' : '1 Live Match') : (LANG === 'ar' ? 'مباراة منتهية' : 'Match Finished')) : (LANG === 'ar' ? 'لا توجد مباريات' : 'No matches')

        mList.innerHTML = `<div style="padding:18px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div><div style="font-size:14px;font-weight:700">${hName} vs ${aName}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${m.tournament}</div></div><span class="status-tag ${m.status}">${m.status === 'live' ? tr.statusLive : tr.statusFinished}</span></div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div style="text-align:center"><div style="font-size:12px;color:var(--text2);margin-bottom:4px">${hName}</div><div style="font-size:38px;font-weight:900;color:var(--teal);font-variant-numeric:tabular-nums">${m.currentHomeScore}<span style="font-size:16px;margin-inline-start:6px;color:var(--text3)">(${m.homeSets})</span></div></div><div style="font-size:28px;color:var(--text3);font-weight:200">:</div><div style="text-align:center"><div style="font-size:12px;color:var(--text2);margin-bottom:4px">${aName}</div><div style="font-size:38px;font-weight:900;color:var(--blue);font-variant-numeric:tabular-nums">${m.currentAwayScore}<span style="font-size:16px;margin-inline-start:6px;color:var(--text3)">(${m.awaySets})</span></div></div></div><button onclick="navigate('detail','${m.id}')" style="width:100%;padding:10px;background:var(--surface2);color:var(--teal);border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;transition:var(--tr)">${tr.viewDetail}</button></div>`
      } else {
        mList.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">${tr.dashNoMatch}</div>`
      }
      const typeGrid = document.getElementById('type-breakdown-grid')
      typeGrid.innerHTML = Object.keys(PT_META).map(id => {
        const h = events.filter(e => e.scoring_side === 'home' && e.point_type === id).length
        const a = events.filter(e => e.scoring_side === 'away' && e.point_type === id).length
        const pt = PT_META[id]
        return `<div style="display:flex;align-items:center;gap:10px;font-size:12px"><div style="width:22px;height:22px;border-radius:6px;background:${pt.bg};display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0"><span style="color:${pt.color}">${pt.icon}</span></div><span style="flex:1;color:var(--text2)">${ptLabel(id)}</span><span style="font-weight:700;color:${pt.color};font-variant-numeric:tabular-nums">${h + a}</span></div>`
      }).join('')
      const feedList = document.getElementById('activity-feed-list')
      const feedEmpty = document.getElementById('feed-empty')
      if (APP.activityFeed.length) {
        document.getElementById('feed-count').textContent = tr.feedCount(APP.activityFeed.length)
        feedList.innerHTML = APP.activityFeed.map(a => `<div class="af-item"><div class="af-dot" style="background:${a.color}"></div><div class="af-text">${a.text}</div><div class="af-time">${a.time}</div></div>`).join('')
      } else {
        feedList.innerHTML = `<div id="feed-empty" style="padding:20px;text-align:center;color:var(--text3);font-size:13px">${tr.feedEmpty}</div>`
      }
    }

    function renderStandings() {
      const tr = T()
      const head = document.getElementById('standings-head')
      const body = document.getElementById('standings-body')
      head.innerHTML = `<tr><th>#</th><th>${tr.standingsClub}</th><th>${tr.standingsPlayed}</th><th>${tr.standingsWon}</th><th>${tr.standingsLost}</th><th>${tr.standingsSW}</th><th>${tr.standingsSL}</th><th>${tr.standingsSets}</th><th>${tr.standingsPts}</th><th>${tr.standingsForm}</th></tr>`
      const tourFilter = (document.getElementById('standings-tournament-filter')?.value || '')
      const genFilter = (document.getElementById('standings-gender-filter')?.value || '')
      const ageFilter = (document.getElementById('standings-agegroup-filter')?.value || '')
      const filtered = window.standingsMatches.filter(m => {
        if (tourFilter && (m.tournament || '') !== tourFilter) return false
        if (genFilter && (m.gender || '') !== genFilter) return false
        if (ageFilter && (m.ageGroup || '') !== ageFilter) return false
        return true
      })
      if (filtered.length === 0) {
        body.innerHTML = `<tr><td colspan="10" style="padding:40px;text-align:center;color:var(--text3);font-size:13px">${tr.standingsNoData}</td></tr>`
        return
      }
      const teamMap = {}
      filtered.forEach(match => {
        const hClub = match.homeClub || match.home || {}
        const aClub = match.awayClub || match.away || {}
        const hName = LANG === 'ar' ? (hClub.name_ar || hClub.name_en || 'Home') : (hClub.name_en || hClub.name_ar || 'Home')
        const aName = LANG === 'ar' ? (aClub.name_ar || aClub.name_en || 'Away') : (aClub.name_en || aClub.name_ar || 'Away')
        if (!teamMap[hName]) teamMap[hName] = { name: hName, played: 0, won: 0, lost: 0, setsWon: 0, setsLost: 0, pts: 0, form: [] }
        if (!teamMap[aName]) teamMap[aName] = { name: aName, played: 0, won: 0, lost: 0, setsWon: 0, setsLost: 0, pts: 0, form: [] }
        const hT = teamMap[hName], aT = teamMap[aName]
        let hSets = 0, aSets = 0
        if (typeof match.homeSets === 'number' && typeof match.awaySets === 'number') {
          hSets = match.homeSets; aSets = match.awaySets
        } else if (Array.isArray(match.setScores)) {
          match.setScores.forEach(s => { if (s.finished) { s.home > s.away ? hSets++ : aSets++ } })
        }
        let hPts = 0, aPts = 0
        if (hSets > aSets) { hPts = (hSets === 3 && aSets === 2) ? 2 : 3; aPts = (hSets === 3 && aSets === 2) ? 1 : 0; hT.won++; aT.lost++; hT.form.push('W'); aT.form.push('L') }
        else if (aSets > hSets) { aPts = (aSets === 3 && hSets === 2) ? 2 : 3; hPts = (aSets === 3 && hSets === 2) ? 1 : 0; aT.won++; hT.lost++; aT.form.push('W'); hT.form.push('L') }
        else { hPts = 1; aPts = 1; hT.form.push('L'); aT.form.push('L') }
        hT.played++; aT.played++; hT.setsWon += hSets; hT.setsLost += aSets; aT.setsWon += aSets; aT.setsLost += hSets; hT.pts += hPts; aT.pts += aPts
      })
      const rows = Object.values(teamMap).sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts
        const aRatio = a.setsLost ? a.setsWon / a.setsLost : a.setsWon
        const bRatio = b.setsLost ? b.setsWon / b.setsLost : b.setsWon
        if (bRatio !== aRatio) return bRatio - aRatio
        return b.setsWon - a.setsWon
      })
      body.innerHTML = rows.map((team, i) => {
        const rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn'
        const recentForm = team.form.slice(-5)
        const formHTML = recentForm.map(f => f === 'W' ? `<div class="sf-w">${tr.formW}</div>` : `<div class="sf-l">${tr.formL}</div>`).join('')
        const setsRatio = `${team.setsWon}/${team.setsLost}`
        return `<tr><td><div class="st-rank ${rc}">${i + 1}</div></td><td style="font-weight:600">${team.name}</td><td>${team.played}</td><td style="color:var(--teal);font-weight:600">${team.won}</td><td style="color:var(--red)">${team.lost}</td><td style="color:var(--teal)">${team.setsWon}</td><td style="color:var(--red)">${team.setsLost}</td><td style="color:var(--text2)">${setsRatio}</td><td style="font-weight:700;font-size:15px">${team.pts}</td><td><div class="st-form">${formHTML}</div></td></tr>`
      }).join('')
    }

    /* ── Schedule ─────────────────────────────────────────────── */
    window.allMatches = []
    function renderSchedule() {
      const tr = T()
      document.getElementById('schedule-title').textContent = tr.scheduleTitle
      document.getElementById('sch-live-lbl').textContent = tr.schLive
      document.getElementById('sch-done-lbl').textContent = tr.schDone
      document.getElementById('schedule-empty-txt').textContent = tr.scheduleEmpty
      const tourFilter = document.getElementById('sch-tournament-filter')?.value || ''
      const all = window.allMatches
      const tours = new Set(all.map(m => m.tournament).filter(Boolean))
      const sel = document.getElementById('sch-tournament-filter')
      if (sel) {
        const prev = sel.value
        sel.innerHTML = `<option value="">${tr.statsFilter === 'Filter by Tournament' ? 'All Tournaments' : 'كل البطولات'}</option>` + [...tours].sort().map(t => `<option value="${t}" ${t === prev ? 'selected' : ''}>${t}</option>`).join('')
      }
      const filtered = tourFilter ? all.filter(m => m.tournament === tourFilter) : all
      const live = filtered.filter(m => m.status === 'live')
      const done = filtered.filter(m => m.status === 'finished')
      const liveGrp = document.getElementById('schedule-live-group')
      const doneGrp = document.getElementById('schedule-done-group')
      const empty = document.getElementById('schedule-empty')
      liveGrp.style.display = live.length ? '' : 'none'
      doneGrp.style.display = done.length ? '' : 'none'
      empty.style.display = (!live.length && !done.length) ? '' : 'none'
      const mkCard = (m) => {
        const hn = LANG === 'ar' ? (m.home?.name_ar || '') : (m.home?.name_en || '')
        const an = LANG === 'ar' ? (m.away?.name_ar || '') : (m.away?.name_en || '')
        const isLive = m.status === 'live', isDone = m.status === 'finished'
        const score = isDone ? `<span style="font-size:18px;font-weight:900">${m.homeSets ?? 0} <span style="color:var(--text3)">&ndash;</span> ${m.awaySets ?? 0}</span>` : isLive ? `<span style="color:var(--red);font-size:12px;font-weight:700;animation:pulse 1s infinite">● LIVE</span>` : ''
        const badge = isDone ? `<span class="sch-badge" style="background:var(--surface2);color:var(--text3)">${tr.statusFinished}</span>` : isLive ? `<span class="sch-badge" style="background:#3b0000;color:#f87171">${tr.statusLive}</span>` : ''
        return `<div class="sch-card${isLive ? ' is-live' : ''}${isDone ? ' is-done' : ''}" onclick="navigate('detail','${m.id}')"><div class="sch-teams"><div>${hn} <span style="color:var(--text3)">vs</span> ${an}</div><div class="sch-meta">${m.tournament || ''} ${m.gender ? '· ' + m.gender : ''} ${m.ageGroup ? '· ' + m.ageGroup : ''}</div></div><div>${score}</div><div>${badge}</div></div>`
      }
      document.getElementById('schedule-live-list').innerHTML = live.map(mkCard).join('')
      document.getElementById('schedule-done-list').innerHTML = done.map(mkCard).join('')
    }

    /* ── Player Stats ─────────────────────────────────────────── */
    function renderPlayerStats() {
      const tr = T()
      document.getElementById('stats-page-title').textContent = tr.statsTitle
      document.getElementById('top-scorers-title').textContent = tr.topScorersTitle
      document.getElementById('pt-breakdown-title').textContent = tr.ptBreakdownTitle
      const tourFilter = document.getElementById('stats-tournament-filter')?.value || ''
      const all = window.allMatches
      const tours = new Set(all.map(m => m.tournament).filter(Boolean))
      const sel = document.getElementById('stats-tournament-filter')
      if (sel) {
        const prev = sel.value
        sel.innerHTML = `<option value="">${tr.statsFilter === 'Filter by Tournament' ? 'All Tournaments' : 'كل البطولات'}</option>` + [...tours].sort().map(t => `<option value="${t}" ${t === prev ? 'selected' : ''}>${t}</option>`).join('')
      }
      const events = (window.allEvents || []).filter(e => !e.undone && !e.is_timeout && !e.is_sub && !e.is_sanction)
      const filtered = tourFilter ? events.filter(e => { const m = all.find(x => x.id === e.matchId); return m && m.tournament === tourFilter }) : events
      const playerMap = {}
      filtered.forEach(e => {
        if (!e.player_num) return
        const m = all.find(x => x.id === e.matchId)
        const side = e.scoring_side
        const teamObj = m ? m[side] : null
        const teamName = teamObj ? (LANG === 'ar' ? teamObj.name_ar : teamObj.name_en) : (e.matchId || '')
        const key = `${e.matchId}_${side}_${e.player_num}`
        if (!playerMap[key]) playerMap[key] = { num: e.player_num, team: teamName, pts: 0, attack: 0, ace: 0, block: 0, dig: 0 }
        playerMap[key].pts++
        if (e.point_type === 'attack') playerMap[key].attack++
        if (e.point_type === 'serve_ace') playerMap[key].ace++
        if (e.point_type === 'block') playerMap[key].block++
        if (e.point_type === 'dig') playerMap[key].dig++
      })
      const players = Object.values(playerMap).sort((a, b) => b.pts - a.pts).slice(0, 20)
      const head = document.getElementById('lb-head'), body = document.getElementById('lb-body'), sub = document.getElementById('top-scorers-sub')
      if (sub) sub.textContent = tr.topScorersNote(players.length)
      head.innerHTML = `<tr><th>#</th><th>${tr.lbPlayer}</th><th>${tr.lbTeam}</th><th>${tr.lbPts}</th><th>${tr.lbAttack}</th><th>${tr.lbAce}</th><th>${tr.lbBlock}</th><th>${tr.lbDig}</th></tr>`
      if (!players.length) {
        body.innerHTML = `<tr><td colspan="8" style="padding:24px;text-align:center;color:var(--text3);font-size:13px">No data.</td></tr>`
      } else {
        body.innerHTML = players.map((p, i) => {
          const medalClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn'
          const medal = `<span class="lb-medal ${medalClass}">${i < 3 ? ['🥇', '🥈', '🥉'][i] : i + 1}</span>`
          return `<tr><td>${medal}</td><td>#${p.num}</td><td style="color:var(--text3)">${p.team}</td><td style="font-weight:900;color:var(--teal)">${p.pts}</td><td>${p.attack || '-'}</td><td>${p.ace || '-'}</td><td>${p.block || '-'}</td><td>${p.dig || '-'}</td></tr>`
        }).join('')
      }
      const typeCount = {}
      filtered.forEach(e => { const t = e.point_type || 'point'; typeCount[t] = (typeCount[t] || 0) + 1 })
      const total = filtered.length || 1
      const colors = { attack: '#f97316', serve_ace: '#facc15', block: '#38bdf8', opponent_error: '#f87171', dig: '#4ade80', point: '#94a3b8', other: '#64748b' }
      const labels = { attack: tr.lbAttack, serve_ace: tr.lbAce, block: tr.lbBlock, opponent_error: 'Error', dig: tr.lbDig, point: 'Direct', other: 'Other' }
      const brk = document.getElementById('pt-breakdown-body')
      brk.innerHTML = Object.entries(typeCount).sort((a, b) => b[1] - a[1]).map(([type, cnt]) => {
        const pct = Math.round(cnt / total * 100)
        const col = colors[type] || '#94a3b8'
        return `<div><div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px"><span style="color:${col};font-weight:600">${labels[type] || type}</span><span style="color:var(--text3)">${cnt} pts &nbsp; ${pct}%</span></div><div style="height:6px;border-radius:3px;background:var(--surface2)"><div style="height:6px;border-radius:3px;background:${col};width:${pct}%;transition:width .5s"></div></div></div>`
      }).join('')
    }

    /* ── Print Scoresheet ───────────────────────────────────────── */
    function printScoresheet() {
      const m = APP.lastRenderedMatch
      if (!m) return
      const tr = T()
      const hn = LANG === 'ar' ? (m.home?.name_ar || '') : (m.home?.name_en || '')
      const an = LANG === 'ar' ? (m.away?.name_ar || '') : (m.away?.name_en || '')
      const sets = m.setScores || []
      const evts = (window.eventsData || []).filter(e => !e.undone)
      const sheet = document.getElementById('print-sheet')
      sheet.innerHTML = `<div class="ps-header"><div class="ps-title">${tr.scoresheetTitle}</div><div style="font-size:11px;text-align:right">${m.tournament || ''} &nbsp;|&nbsp; ${m.gender || ''} ${m.ageGroup || ''}<br>${new Date().toLocaleDateString()}</div></div><div class="ps-score-grid"><div><div class="ps-team-name" style="color:#14b8a6">${hn}</div></div><div><div class="ps-sets-score">${m.homeSets ?? 0} &ndash; ${m.awaySets ?? 0}</div><div style="font-size:11px;color:#666;margin-top:4px">Sets Won</div></div><div><div class="ps-team-name" style="color:#3b82f6">${an}</div></div></div><table class="ps-sets-table"><thead><tr><th>Set</th><th>${hn}</th><th>${an}</th><th>Winner</th></tr></thead><tbody>${sets.filter(s => s.finished).map(s => `<tr><td>Set ${s.num}</td><td><b>${s.home}</b></td><td><b>${s.away}</b></td><td>${s.home > s.away ? hn : an}</td></tr>`).join('')}</tbody></table><table class="ps-events-table"><thead><tr><th>Set</th><th>Team</th><th>Type</th><th>Score After</th></tr></thead><tbody>${evts.slice(-50).map(e => `<tr><td>${e.set_num}</td><td>${e.scoring_side === 'home' ? hn : an}</td><td>${e.point_type}</td><td>${e.home_score_after}–${e.away_score_after}</td></tr>`).join('')}</tbody></table>`
      window.print()
    }

    /* ── Toast ───────────────────────────────────────────────── */
    function toast(msg, dur = 2500) {
      const el = document.getElementById('toast')
      el.textContent = msg
      el.style.opacity = '1'
      setTimeout(() => el.style.opacity = '0', dur)
    }

    /* ── Init ────────────────────────────────────────────────── */
    applyDir()
    updateStaticText()
    renderHome([])
    renderStandings()
    renderSchedule()
    renderPlayerStats()

    APP.pollInterval = setInterval(pollReferee, 2000)

    const isAdmin = sessionStorage.getItem('xura_admin') || localStorage.getItem('xura_admin');
    const isRef = sessionStorage.getItem('xura_referee') || localStorage.getItem('xura_referee');

    if (isAdmin || isRef) {
      const tabs = document.getElementById('admin-tabs');
      tabs.style.display = 'flex';
      document.getElementById('login-entry').style.display = 'none';

      // Filter links based on role
      const links = tabs.querySelectorAll('a');
      links.forEach(link => {
        if (isAdmin) {
          // Admin sees Setup and Database Manager
          if (link.href.includes('referee-login.html')) link.style.display = 'none';
        } else if (isRef) {
          // Referee ONLY sees the Referee App link
          if (link.href.includes('match-setup.html') || link.href.includes('admin-db-manager.html')) {
            link.style.display = 'none';
          }
        }
      });
    }

    // Firebase init
    if (window.firebaseConfigured) {
      window.initFirestoreSync()
    } else {
      // Wait for Firebase module to finish loading
      const waitFB = setInterval(() => {
        if (window.firebaseConfigured && typeof window.initFirestoreSync === 'function') {
          clearInterval(waitFB)
          window.initFirestoreSync()
        }
      }, 100)
    }
  </script>
</body>

</html>
