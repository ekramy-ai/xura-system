<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#020617">
<title>XURA Referee</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --teal:#5eead4;--teal-dark:#0d9488;--teal-bg:#134e4a;
    --blue:#60a5fa;--blue-dark:#1d4ed8;--blue-bg:#1e3a5f;
    --bg:#020617;--surface:#0f172a;--surface2:#1e293b;
    --muted:#475569;--faint:#334155;--text:#e2e8f0;
    --amber:#f59e0b;--red:#ef4444;--green:#4ade80;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);
    font-family:'Noto Sans Arabic','Segoe UI',Tahoma,sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100dvh;max-width:420px;margin:0 auto;position:relative}

  /* Header */
  #header{padding:12px 14px 10px;border-bottom:1px solid var(--surface2);
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
  #sets-won{display:flex;align-items:center;gap:8px;flex-shrink:0}
  #sets-won .n{font-size:22px;font-weight:900;line-height:1}
  #sets-won .sep{color:var(--faint)}
  .status-badge{font-size:10px;padding:3px 8px;border-radius:6px;white-space:nowrap}

  /* Lang toggle */
  #lang-btn{
    padding:4px 10px;border-radius:20px;border:1px solid var(--surface2);
    background:transparent;color:var(--teal);font-size:11px;font-weight:700;
    cursor:pointer;font-family:inherit;letter-spacing:.05em;flex-shrink:0;
    transition:background .15s}
  #lang-btn:hover{background:var(--surface)}

  /* Set Tabs */
  #tabs{display:flex;gap:5px;padding:10px 12px 0;flex-shrink:0}
  .tab{flex:1;padding:6px 2px;border-radius:8px;border:none;cursor:pointer;
    font-size:11px;font-family:inherit;transition:all .15s;line-height:1.2}
  .tab.active{background:var(--teal-bg);color:var(--teal);font-weight:700}
  .tab.done{background:var(--surface);color:var(--muted)}
  .tab.pending{background:var(--surface);color:var(--faint)}

  /* Score */
  #score-area{flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:16px;transition:background .35s}
  #score-area.flash-home{animation:fh .4s ease}
  #score-area.flash-away{animation:fa .4s ease}
  @keyframes fh{0%,100%{background:var(--bg)}35%{background:#0d2e2a}}
  @keyframes fa{0%,100%{background:var(--bg)}35%{background:#0e1f3d}}
  #scores{display:flex;align-items:center;gap:20px;margin-bottom:6px}
  .score-num{font-size:84px;font-weight:900;line-height:1;letter-spacing:-3px;
    font-variant-numeric:tabular-nums}
  .score-num.bump{animation:bump .18s ease}
  @keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
  .score-divider{font-size:32px;color:var(--faint);font-weight:200}
  .club-sub{font-size:11px;text-align:center;margin-top:4px;opacity:.5}
  #set-hint{font-size:10px;color:var(--faint);margin-top:8px}

  /* Buttons */
  #btn-row{display:flex;gap:10px;padding:0 16px 10px;flex-shrink:0}
  .score-btn{flex:1;height:88px;border-radius:18px;border:1.5px solid;
    font-family:inherit;font-size:15px;font-weight:700;color:#fff;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    transition:transform .1s,filter .1s;touch-action:manipulation}
  .score-btn:active{transform:scale(.92)!important;filter:brightness(1.2)}
  .score-btn small{font-size:11px;font-weight:400;opacity:.75}
  .score-btn.home{background:var(--teal-dark);border-color:var(--teal-bg)}
  .score-btn.away{background:var(--blue-dark);border-color:var(--blue-bg)}
  .score-btn:disabled{opacity:.35;cursor:not-allowed}

  /* Secondary */
  #sec-row{display:flex;gap:8px;padding:0 16px 8px;flex-shrink:0;flex-wrap:wrap}
  .sec-btn{flex:1;padding:9px;background:transparent;border:1px solid var(--surface2);
    border-radius:12px;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;
    transition:background .1s;min-width:80px}
  .sec-btn:hover{background:var(--surface)}
  .sec-btn.warning{color:var(--amber);border-color:#422006}
  #sync-btn{padding:9px 12px;background:#422006;border:1px solid #92400e;
    border-radius:12px;color:var(--amber);font-size:12px;font-family:inherit;cursor:pointer;display:none}
  /* Time Out */
  #timeout-row{display:flex;gap:8px;padding:0 16px 4px;flex-shrink:0}
  .to-btn{flex:1;padding:5px 4px;border-radius:10px;border:1px solid #422006;
    background:#1c0f04;color:var(--amber);font-size:10px;font-family:inherit;
    cursor:pointer;transition:all .15s;text-align:center;line-height:1.3}
  .to-btn:active{transform:scale(.94)}
  .to-btn:disabled{opacity:.35;cursor:not-allowed}
  .to-count{font-size:14px;font-weight:900;display:block}

  /* Service Indicator */
  #serve-bar{display:flex;align-items:center;padding:3px 16px 2px;gap:8px;flex-shrink:0}
  .serve-side{flex:1;height:24px;border-radius:8px;display:flex;align-items:center;
    font-size:10px;font-weight:700;transition:all .3s;border:1.5px solid transparent;
    padding:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .serve-side.active{border-color:currentColor;background:rgba(255,255,255,.06)}
  #serve-arrow{font-size:20px;flex-shrink:0;transition:all .35s cubic-bezier(.34,1.56,.64,1)}
  #serve-run{font-size:9px;color:var(--faint);min-width:18px;text-align:center;flex-shrink:0}

  /* Substitutions */
  #sub-row{display:flex;gap:6px;padding:0 16px 3px;flex-shrink:0}
  .sub-side{flex:1;display:flex;align-items:center;justify-content:space-between;
    background:var(--surface);border:1px solid var(--surface2);
    border-radius:8px;padding:4px 8px}
  .sub-label{font-size:9px;color:var(--muted)}
  .sub-count{font-size:13px;font-weight:900}
  .sub-btn{padding:2px 8px;border-radius:6px;border:none;font-size:12px;
    font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s}
  .sub-btn:active{transform:scale(.9)}
  .sub-btn:disabled{opacity:.3;cursor:not-allowed}

  /* Sanctions */
  #sanction-row{display:flex;gap:5px;padding:0 16px 3px;flex-shrink:0}
  .sanc-btn{flex:1;padding:4px 3px;border-radius:8px;border:none;cursor:pointer;
    font-size:10px;font-weight:700;font-family:inherit;display:flex;
    align-items:center;justify-content:center;gap:3px;transition:all .12s}
  .sanc-btn:active{transform:scale(.9)}
  .sanc-yellow{background:#422006;color:var(--amber)}
  .sanc-red{background:#3b0000;color:#f87171}
  #sanc-sep{display:flex;align-items:center;font-size:10px;color:var(--faint);padding:0 1px}

  /* Set Timer */
  #timer-bar{display:flex;align-items:center;justify-content:center;
    padding:1px 16px 3px;gap:6px;flex-shrink:0}
  #set-timer{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;
    color:var(--muted);letter-spacing:.05em}
  #timer-dot{width:5px;height:5px;border-radius:50%;background:var(--green);
    animation:blink 1.2s ease infinite;flex-shrink:0}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

  /* Log */
  #log-wrap{margin:0 16px 8px;border:1px solid var(--surface2);border-radius:12px;
    overflow:hidden;flex-shrink:0;min-height:0}
  #log-title{padding:4px 12px;font-size:10px;color:var(--faint);
    border-bottom:1px solid var(--surface2);background:#0a0f1e}
  #log-list{background:#050a14;max-height:100px;overflow-y:auto}
  .log-item{display:flex;justify-content:space-between;align-items:center;
    padding:6px 12px;font-size:11px;border-bottom:1px solid #060d1a;
    animation:slideIn .2s ease}
  .log-item:last-child{border-bottom:none}
  .log-item.undone{opacity:.3;text-decoration:line-through}
  .log-type{display:flex;align-items:center;gap:4px}
  @keyframes slideIn{from{transform:translateX(8px);opacity:0}to{transform:translateX(0);opacity:1}}

  /* Overlay */
  #overlay{position:absolute;inset:0;background:rgba(0,0,0,.82);
    display:none;flex-direction:column;align-items:center;justify-content:flex-end;z-index:50}
  #overlay.open{display:flex;animation:ovFade .15s ease}
  @keyframes ovFade{from{opacity:0}to{opacity:1}}
  #ov-info{position:absolute;top:10%;text-align:center}
  #ov-club{font-size:14px;font-weight:600;letter-spacing:.05em;margin-bottom:6px}
  #ov-hint{font-size:11px;color:var(--muted)}
  #ov-panel{width:100%;max-width:420px;background:var(--surface);
    border-radius:24px 24px 0 0;padding:18px 14px 28px;animation:panelUp .22s ease}
  @keyframes panelUp{from{transform:translateY(36px);opacity:0}to{transform:translateY(0);opacity:1}}
  #ov-header{display:flex;align-items:center;justify-content:space-between;
    padding-bottom:12px;border-bottom:1px solid var(--surface2);margin-bottom:14px}
  #ov-name{font-size:16px;font-weight:700}
  #ov-sub{font-size:11px;color:var(--muted);margin-top:2px}
  #cd-wrap{position:relative;width:44px;height:44px;flex-shrink:0}
  #cd-wrap svg{transform:rotate(-90deg)}
  #cd-num{position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;font-size:13px;font-weight:700;
    font-variant-numeric:tabular-nums;transition:color .3s}
  #ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .pt-btn{border-radius:14px;padding:13px 6px;border:1.5px solid;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    transition:transform .1s,filter .1s,background .1s;font-family:inherit}
  .pt-btn:active{transform:scale(.91)!important;filter:brightness(1.3)}
  .pt-btn .ic{font-size:22px;line-height:1;font-weight:900}
  .pt-btn .lb{font-size:13px;font-weight:600;line-height:1}
  .pt-btn .sk{font-size:10px;font-family:monospace;opacity:.55}
  #ov-cancel{width:100%;margin-top:10px;padding:10px;background:transparent;
    border:1px solid var(--surface2);border-radius:12px;color:var(--muted);
    font-size:13px;font-family:inherit;cursor:pointer}
  #ov-kbd{text-align:center;margin-top:8px;font-size:10px;color:var(--surface2)}

  /* Detail mode toggle */
  #detail-toggle-wrap{display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 16px 6px;flex-shrink:0}
  #detail-toggle-wrap label{font-size:11px;color:var(--muted);cursor:pointer}
  .toggle-sw{position:relative;width:36px;height:20px;cursor:pointer}
  .toggle-sw input{opacity:0;width:0;height:0}
  .toggle-sw .slider{position:absolute;inset:0;background:var(--surface2);border-radius:10px;transition:.2s}
  .toggle-sw .slider::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#94a3b8;left:2px;top:2px;transition:.2s}
  .toggle-sw input:checked+.slider{background:var(--teal-bg)}
  .toggle-sw input:checked+.slider::before{transform:translateX(16px);background:var(--teal)}

  /* Player number step */
  #player-step{display:none;flex-direction:column;gap:10px}
  #player-step.show{display:flex}
  #player-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .pnum-btn{width:100%;padding:10px 4px;border-radius:12px;border:1.5px solid var(--surface2);
    background:var(--surface);color:var(--text);font-size:16px;font-weight:700;
    cursor:pointer;transition:all .12s;font-family:inherit}
  .pnum-btn:hover{border-color:var(--teal-dark);background:var(--teal-bg)}
  .pnum-btn:active{transform:scale(.92)}
  .pnum-btn.selected{border-color:var(--teal);background:var(--teal-bg);color:var(--teal)}
  #player-skip{margin-top:2px;padding:8px;background:transparent;border:1px solid var(--surface2);
    border-radius:10px;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer}
  #type-step{display:flex;flex-direction:column;gap:9px}
  #step-title{font-size:13px;font-weight:600;color:var(--teal);margin-bottom:4px;text-align:center}

  /* Match Over */
  #match-over{display:none;position:absolute;inset:0;background:rgba(2,6,23,.96);
    flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:60}
  #match-over.show{display:flex}
  #match-over h2{font-size:28px;font-weight:900;color:var(--teal)}
  #match-over p{font-size:16px;color:var(--muted)}
  #match-over button{padding:12px 32px;border-radius:14px;border:none;
    background:var(--teal-dark);color:#fff;font-size:14px;font-family:inherit;cursor:pointer;margin-top:8px}
</style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDY3k5KR2NDncsFtee7u6pXMMi1WvwYq7c",
      authDomain: "xura-system.firebaseapp.com",
      projectId: "xura-system",
      storageBucket: "xura-system.firebasestorage.app",
      messagingSenderId: "184949976586",
      appId: "1:184949976586:web:3d70738663ec1d43f639f3"
    };

    window.firebaseApp = initializeApp(firebaseConfig);
    window.db = initializeFirestore(window.firebaseApp, {localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()})});
    window.setDocFirebaseDB = setDoc;
    window.getDocFirebaseDB = getDoc;
    window.updateDocFirebaseDB = updateDoc;
    window.docFirebaseDB = doc;
    window.collectionFirebaseDB = collection;
    window.firebaseConfigured = true;

    const auth = getAuth(window.firebaseApp);
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Fetch referee doc to see if PIN is set
        const refDoc = await getDoc(doc(window.db, 'referees', user.uid));
        if (refDoc.exists()) {
          const data = refDoc.data();
          window.loggedInUserRef = { id: user.uid, ...data };
          // If PIN is '0000', they must change it
          if (data.pin === '0000') {
            showPinSetup();
          } else {
            sessionStorage.setItem('xura_referee', JSON.stringify(window.loggedInUserRef));
            if (typeof window.initFirestoreSync === 'function') window.initFirestoreSync();
          }
        }
      } else {
        // No session, check if already in sessionStorage (legacy)
        if (!sessionStorage.getItem('xura_referee')) {
          window.location.href = 'referee-login.html';
        }
      }
    });

    window.updateRefereePin = async (newPin) => {
      if (!window.loggedInUserRef) return;
      await updateDoc(doc(window.db, 'referees', window.loggedInUserRef.id), { pin: newPin });
      window.loggedInUserRef.pin = newPin;
      sessionStorage.setItem('xura_referee', JSON.stringify(window.loggedInUserRef));
      location.reload();
    };
  </script>
</head>
<body>
<div id="app">
  <div id="header">
    <div style="min-width:0">
      <div style="font-size:11px;color:var(--muted)" id="set-label"></div>
      <div style="font-size:10px;color:var(--faint);margin-top:2px" id="pending-info"></div>
    </div>
    <div id="sets-won">
      <span class="n" id="sw-home" style="color:var(--teal)">0</span>
      <span class="sep">—</span>
      <span class="n" id="sw-away" style="color:var(--blue)">0</span>
      <span id="sets-label" style="font-size:10px;color:var(--faint);margin-inline-start:4px"></span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <div id="ref-display" style="font-size:10px; color:var(--text2); text-align:right; margin-inline-end:8px"></div>
      <button id="lang-btn" onclick="toggleLang()"></button>
      <div id="online-badge" class="status-badge" style="background:#052e16;color:var(--green)"></div>
    </div>
  </div>

  <div id="tabs"></div>

  <!-- Service Indicator -->
  <div id="serve-bar">
    <div class="serve-side" id="serve-home" style="color:var(--teal);justify-content:flex-start;padding-inline-start:10px">
      <span id="serve-home-name"></span>
    </div>
    <span id="serve-run" title="Service run">0</span>
    <div id="serve-arrow" style="color:var(--faint)">▶</div>
    <div class="serve-side" id="serve-away" style="color:var(--blue);justify-content:flex-end;padding-inline-end:10px">
      <span id="serve-away-name"></span>
    </div>
  </div>

  <!-- Set Timer -->
  <div id="timer-bar">
    <div id="timer-dot" style="display:none"></div>
    <span id="set-timer">00:00</span>
    <span style="font-size:10px;color:var(--faint)" id="timer-label"></span>
  </div>

  <div id="score-area">
    <div id="scores">
      <div style="text-align:center">
        <div class="score-num" id="sh" style="color:var(--teal)">0</div>
        <div class="club-sub" id="hn"></div>
      </div>
      <div class="score-divider">:</div>
      <div style="text-align:center">
        <div class="score-num" id="sa" style="color:var(--blue)">0</div>
        <div class="club-sub" id="an"></div>
      </div>
    </div>
    <div id="set-hint"></div>
  </div>

  <div id="btn-row" style="height:auto">
    <div style="flex:1; display:flex; flex-direction:column; gap:8px">
      <button class="score-btn home" id="btn-home" onclick="pressScore('home')" style="min-height:90px">
        <small id="btn-hn"></small><span id="btn-home-label"></span>
      </button>
      <button class="score-btn home" onclick="decrementScore('home')" style="background:var(--surface2); border:1px solid rgba(20,184,166,0.3); color:var(--teal); min-height:44px; font-size:16px">- 1</button>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:8px">
      <button class="score-btn away" id="btn-away" onclick="pressScore('away')" style="min-height:90px">
        <small id="btn-an"></small><span id="btn-away-label"></span>
      </button>
      <button class="score-btn away" onclick="decrementScore('away')" style="background:var(--surface2); border:1px solid rgba(56,189,248,0.3); color:var(--blue); min-height:44px; font-size:16px">- 1</button>
    </div>
  </div>

  <div id="detail-toggle-wrap">
    <label id="detail-label" for="detail-check">تفاصيل اللاعب</label>
    <label class="toggle-sw"><input type="checkbox" id="detail-check" onchange="toggleDetailMode()"><span class="slider"></span></label>
  </div>

  <div id="sec-row">
    <button class="sec-btn" id="undo-btn" onclick="undoLast()"></button>
    <button class="sec-btn warning" id="endset-btn" onclick="endSet()"></button>
    <button id="sync-btn" onclick="syncNow()"></button>
  </div>
  <!-- Time Out Row -->
  <div id="timeout-row">
    <button class="to-btn" id="to-home-btn" onclick="recordTimeout('home')">
      <span class="to-count" id="to-home-count">2</span>
      <span id="to-home-label">Time Out</span>
    </button>
    <div style="display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);padding:0 6px;white-space:nowrap" id="to-label">T/O</div>
    <button class="to-btn" id="to-away-btn" onclick="recordTimeout('away')" style="border-color:#0e1e3d;background:#050e1e;color:var(--blue)">
      <span class="to-count" id="to-away-count">2</span>
      <span id="to-away-label">Time Out</span>
    </button>
  </div>

  <!-- Substitution Row -->
  <div id="sub-row">
    <div class="sub-side">
      <span class="sub-label" id="sub-home-lbl">SUB</span>
      <span class="sub-count" id="sub-home-count" style="color:var(--teal)">6</span>
      <button class="sub-btn" id="sub-home-btn" onclick="recordSub('home')" style="background:var(--teal-bg);color:var(--teal)">+</button>
    </div>
    <span style="font-size:10px;color:var(--faint);padding:0 4px" id="sub-center-lbl">SUB</span>
    <div class="sub-side" style="flex-direction:row-reverse">
      <span class="sub-label" id="sub-away-lbl">SUB</span>
      <span class="sub-count" id="sub-away-count" style="color:var(--blue)">6</span>
      <button class="sub-btn" id="sub-away-btn" onclick="recordSub('away')" style="background:var(--blue-bg);color:var(--blue)">+</button>
    </div>
  </div>

  <!-- Sanction Row -->
  <div id="sanction-row">
    <button class="sanc-btn sanc-yellow" onclick="recordSanction('home','yellow')">🟨 <span id="sanc-home-y-lbl"></span></button>
    <button class="sanc-btn sanc-red" onclick="recordSanction('home','red')">🟥 <span id="sanc-home-r-lbl"></span></button>
    <span id="sanc-sep">|</span>
    <button class="sanc-btn sanc-red" onclick="recordSanction('away','red')">🟥 <span id="sanc-away-r-lbl"></span></button>
    <button class="sanc-btn sanc-yellow" onclick="recordSanction('away','yellow')">🟨 <span id="sanc-away-y-lbl"></span></button>
  </div>

  <div id="log-wrap">
    <div id="log-title"></div>
    <div id="log-list">
      <div id="log-empty" style="padding:8px 12px;font-size:11px;color:var(--faint);text-align:center"></div>
    </div>
  </div>

  <!-- Overlay -->
  <div id="overlay">

  <!-- PIN Setup Overlay -->
  <div id="pin-setup" style="display:none;position:absolute;inset:0;background:var(--bg);z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center">
    <div style="font-size:40px;margin-bottom:10px">🔐</div>
    <h2 style="font-size:20px;margin-bottom:8px">إعداد رمز الدخول الخاص بك</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:24px">يرجى تعيين رمز PIN مكون من 4 أرقام لاستخدامه لاحقاً</p>
    
    <div id="pin-setup-dots" style="display:flex;gap:12px;margin-bottom:24px">
      <div class="dot" style="width:14px;height:14px;border-radius:50%;border:2px solid var(--surface2)"></div>
      <div class="dot" style="width:14px;height:14px;border-radius:50%;border:2px solid var(--surface2)"></div>
      <div class="dot" style="width:14px;height:14px;border-radius:50%;border:2px solid var(--surface2)"></div>
      <div class="dot" style="width:14px;height:14px;border-radius:50%;border:2px solid var(--surface2)"></div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:240px">
      <button class="sec-btn" style="height:50px;font-size:20px" onclick="setupPinPress('1')">1</button>
      <button class="sec-btn" style="height:50px;font-size:20px" onclick="setupPinPress('2')">2</button>
      <button class="sec-btn" style="height:50px;font-size:20px" onclick="setupPinPress('3')">3</button>
      <button class="sec-btn" style="height:50px;font-size:20px" onclick="setupPinPress('4')">4</button>
      <button class="sec-btn" style="height:50px;font-size:20px" onclick="setupPinPress('5')">5</button>
      <button class="sec-btn" style="height:50px;font-size:20px" onclick="setupPinPress('6')">6</button>
      <button class="sec-btn" style="height:50px;font-size:20px" onclick="setupPinPress('7')">7</button>
      <button class="sec-btn" style="height:50px;font-size:20px" onclick="setupPinPress('8')">8</button>
      <button class="sec-btn" style="height:50px;font-size:20px" onclick="setupPinPress('9')">9</button>
      <button class="sec-btn" style="height:50px" onclick="setupPinClear()">⌫</button>
      <button class="sec-btn" style="height:50px;font-size:20px" onclick="setupPinPress('0')">0</button>
      <button class="sec-btn" style="height:50px;color:var(--teal)" onclick="setupPinSubmit()">✓</button>
    </div>
    <div id="pin-setup-status" style="margin-top:20px;font-size:13px;color:var(--red)"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   XURA Referee v3 — Bilingual AR / EN
   ═══════════════════════════════════════════════════════ */

/* ── i18n ─────────────────────────────────────────────── */
const TRANSLATIONS = {
  en: {
    setLabel:     (n,t)=>`Set ${n} of ${t}`,
    setsLabel:    'Sets',
    online:       'Online',
    offline:      'Offline',

    subLabel:     'Subs Left',
    subToast:     (name,left) => `🔄 Sub — ${name} (${left} left)`,

    sanctionYellow: 'Warning',

  },
  ar: {
    setLabel:     (n,t)=>`الشوط ${n} من ${t}`,
    setsLabel:    'أشواط',
    online:       'متصل',
    offline:      'غير متصل',
    setHintNorm:  'للفوز: 25 نقطة بفارق 2',
    setHintFinal: 'للفوز: 15 نقطة بفارق 2',
    pointBtn:     'نقطة +',
    undoBtn:      'تراجع ↩',
    endSetBtn:    'إنهاء الشوط ▸',
    syncBtn:      'زامن ↑',
    logTitle:     'آخر الأحداث',
    logEmpty:     'اضغط نقطة للبدء',
    ovHint:       'اختر نوع النقطة',
    ovSub:        'نقطة لـ',
    ovCancel:     'إلغاء',
    ovKbd:        'اضغط [0–5] للاختيار · Esc للإلغاء',
    matchOver:    'انتهت المباراة',
    matchWon:     (name,h,a)=>`<div style="font-size:24px;margin-bottom:8px">فاز ${name} <b style="color:var(--teal)">${h}—${a}</b></div>`,
    newMatch:     'مباراة جديدة',
    setEnded:     (n,next)=>`انتهى الشوط ${n} ← الشوط ${next}`,
    undone:       'تم التراجع',
    synced:       'تمّت المزامنة',
    pendingPts:   (n)=>`${n} نقطة معلّقة`,
    set:          (n)=>`ش${n}`,
    point:        'نقطة',
    attack:       'ضرب',
    serve_ace:    'إيس',
    block:        'كتلة',
    opponent_error:'خطأ خصم',
    dig:          'استقبال',
    other:        'أخرى',
    selectPlayer: 'اختر رقم اللاعب',
    skipPlayer:   'تخطي — بدون لاعب',
    detailLabel:  'لاعب + مهارة',
    timeoutBtn:   'تايم أوت',
    timeoutLabel: 'ت/أ لكل شوط',
    timeoutToast: (name) => `⏱ تايم أوت — ${name}`,
    timeoutNone:  'لا تايم أوت متبقية',
    subBtn:       'تبديل',
    subLabel:     'تبديلات متبقية',
    subToast:     (name,left) => `🔄 تبديل — ${name} (${left} متبقية)`,
    subNone:      'لا تبديلات متبقية',
    sanctionYellow: 'إنذار',
    sanctionRed:    'عقوبة',
    sanctionYellowToast: (name) => `🟨 إنذار — ${name}`,
    sanctionRedToast:    (name) => `🟥 نقطة عقوبة — ${name}`,
    serveLabel:   'الإرسال',
    timerLabel:   'وقت الشوط',
  }
}

/* Auto-detect: default English, fallback Arabic if browser lang starts with 'ar' */
const browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase()
let LANG = browserLang.startsWith('ar') ? 'ar' : 'en'

function t(key, ...args) {
  const val = TRANSLATIONS[LANG][key]
  return typeof val === 'function' ? val(...args) : val
}

function applyDir() {
  document.documentElement.lang = LANG
  document.documentElement.dir  = LANG === 'ar' ? 'rtl' : 'ltr'
  document.getElementById('lang-btn').textContent = LANG === 'ar' ? 'EN' : 'عر'
}

function toggleLang() {
  LANG = LANG === 'ar' ? 'en' : 'ar'
  localStorage.setItem('xura_lang', LANG)
  applyDir()
  renderAll()
}

// Restore saved lang preference
const savedLang = localStorage.getItem('xura_lang')
if (savedLang === 'ar' || savedLang === 'en') LANG = savedLang

/* ── CLUBS & MATCH SETUP ─────────────────────────────── */
const URL_MATCH_ID = new URLSearchParams(window.location.search).get('matchId');
if (!URL_MATCH_ID) {
  window.location.href = "match-setup.html";
}

let matchData = null;
let CLUBS = null;

const clubName = (side) => CLUBS && CLUBS[side] ? (LANG === 'ar' ? CLUBS[side].name_ar : CLUBS[side].name_en) : '';

/* ── POINT TYPES ──────────────────────────────────────── */
const POINT_TYPE_META = [
  { id:'attack',         icon:'▲', color:'#f97316', bg:'#431407', border:'#9a3412', shortcut:'1' },
  /* 'point' type used internally for quick mode — not shown in overlay grid */
  { id:'serve_ace',      icon:'◎', color:'#facc15', bg:'#422006', border:'#92400e', shortcut:'2' },
  { id:'block',          icon:'■', color:'#38bdf8', bg:'#0c1a3a', border:'#1e40af', shortcut:'3' },
  { id:'opponent_error', icon:'✕', color:'#f87171', bg:'#3b0764', border:'#7e22ce', shortcut:'4' },
  { id:'dig',            icon:'↙', color:'#4ade80', bg:'#052e16', border:'#166534', shortcut:'5' },
  { id:'other',          icon:'●', color:'#94a3b8', bg:'#0f172a', border:'#334155', shortcut:'6' },
]
const ptLabel = (id) => t(id)

/* ── State ────────────────────────────────────────────── */
const S = {
  sets: Array.from({length:5},(_,i)=>({num:i+1,home:0,away:0,status:i===0?'active':'pending',winner:null})),
  cur: 0,
  setsWon: {home:0,away:0},
  matchDone: false,
  events: [],
  overlay: null,
  cdInterval: null,
  cdSec: 8,
  circumference: 2 * Math.PI * 16,
  detailMode: false,
  selectedPlayer: null,
  // Time Outs: 2 per team per set
  timeouts: { home: 2, away: 2 },
  // Substitutions: 6 per team per set (FIVB rule)
  subs: { home: 6, away: 6 },
  // Serving side: 'home' starts by default
  serving: 'home',
  serveRun: 0,
  // Set timer
  setStartTime: null,
  timerInterval: null,
}

/* ── Offline Queue ────────────────────────────────────── */
function enqueue(ev){
  ev.matchId = URL_MATCH_ID;
  const id = 'evt_' + Date.now() + Math.floor(Math.random()*1000);
  if (window.firebaseConfigured) {
    window.setDocFirebaseDB(window.docFirebaseDB(window.db, 'events', id), ev);
    window.setDocFirebaseDB(window.docFirebaseDB(window.db, 'referees', URL_MATCH_ID), { lastActive: Date.now(), matchId: URL_MATCH_ID });
  }
}
async function syncNow(){}
function renderPending(){}

/* ── Online ───────────────────────────────────────────── */
function updateOnline(){
  const b = document.getElementById('online-badge')
  if(navigator.onLine){
    b.style.background='#052e16'; b.style.color='var(--green)'
    b.textContent = t('online')
    syncNow()
  } else {
    b.style.background='#3b0764'; b.style.color='#c4b5fd'
    b.textContent = t('offline')
  }
}
window.addEventListener('online',  updateOnline)
window.addEventListener('offline', updateOnline)

/* ── Render ───────────────────────────────────────────── */
function activeSet(){ return S.sets[S.cur] }

function renderAll(){
  applyDir()
  const s = activeSet()

  document.getElementById('sh').textContent = s.home
  document.getElementById('sa').textContent = s.away
  document.getElementById('hn').textContent = clubName('home')
  document.getElementById('an').textContent = clubName('away')
  document.getElementById('btn-hn').textContent = clubName('home')
  document.getElementById('btn-an').textContent = clubName('away')
  document.getElementById('btn-home-label').textContent = t('pointBtn')
  document.getElementById('btn-away-label').textContent = t('pointBtn')
  document.getElementById('set-label').textContent = t('setLabel', s.num, 5)
  document.getElementById('sets-label').textContent = t('setsLabel')
  document.getElementById('sw-home').textContent = S.setsWon.home
  document.getElementById('sw-away').textContent = S.setsWon.away
  document.getElementById('set-hint').textContent = s.num < 5 ? t('setHintNorm') : t('setHintFinal')
  document.getElementById('undo-btn').textContent   = t('undoBtn')
  document.getElementById('endset-btn').textContent = t('endSetBtn')
  document.getElementById('detail-label').textContent = t('detailLabel')
  document.getElementById('log-title').textContent  = t('logTitle')
  document.getElementById('ov-hint').textContent    = t('ovHint')
  document.getElementById('ov-sub').textContent     = t('ovSub')
  document.getElementById('ov-cancel').textContent  = t('ovCancel')
  document.getElementById('ov-kbd').textContent     = t('ovKbd')
  document.getElementById('mo-new').textContent     = t('newMatch')
  updateOnline()

  const disabled = S.matchDone || s.status !== 'active'
  document.getElementById('btn-home').disabled = disabled
  document.getElementById('btn-away').disabled = disabled

  // Time out buttons
  const toHome = document.getElementById('to-home-btn')
  const toAway = document.getElementById('to-away-btn')
  if(toHome){
    document.getElementById('to-home-count').textContent = S.timeouts.home
    document.getElementById('to-away-count').textContent = S.timeouts.away
    document.getElementById('to-home-label').textContent = t('timeoutBtn')
    document.getElementById('to-away-label').textContent = t('timeoutBtn')
    document.getElementById('to-label').textContent = t('timeoutLabel')
    toHome.disabled = disabled || S.timeouts.home <= 0
    toAway.disabled = disabled || S.timeouts.away <= 0
    toHome.style.opacity = S.timeouts.home > 0 ? '1' : '0.35'
    toAway.style.opacity = S.timeouts.away > 0 ? '1' : '0.35'
  }

  // Service indicator
  const srvHome = document.getElementById('serve-home')
  const srvAway = document.getElementById('serve-away')
  const srvArrow = document.getElementById('serve-arrow')
  if(srvHome && CLUBS){
    const hName = LANG==='ar' ? CLUBS.home.name_ar : CLUBS.home.name_en
    const aName = LANG==='ar' ? CLUBS.away.name_ar : CLUBS.away.name_en
    document.getElementById('serve-home-name').textContent = hName
    document.getElementById('serve-away-name').textContent = aName
    srvHome.classList.toggle('active', S.serving==='home')
    srvAway.classList.toggle('active', S.serving==='away')
    // Arrow: show which side is serving — use emoji only, no transform (would cancel out)
    srvArrow.textContent = S.serving==='home' ? '⟶' : '⟵'
    srvArrow.style.color = S.serving==='home' ? 'var(--teal)' : 'var(--blue)'
    srvArrow.style.fontSize = '22px'
    document.getElementById('serve-run').textContent = S.serveRun > 1 ? `×${S.serveRun}` : ''
  }

  // Substitution buttons
  if(document.getElementById('sub-home-btn')){
    document.getElementById('sub-home-count').textContent = S.subs.home
    document.getElementById('sub-away-count').textContent = S.subs.away
    document.getElementById('sub-home-lbl').textContent = t('subBtn')
    document.getElementById('sub-away-lbl').textContent = t('subBtn')
    document.getElementById('sub-center-lbl').textContent = t('subLabel')
    document.getElementById('sub-home-btn').disabled = disabled || S.subs.home <= 0
    document.getElementById('sub-away-btn').disabled = disabled || S.subs.away <= 0
  }

  // Sanction labels
  if(document.getElementById('sanc-home-y-lbl')){
    document.getElementById('sanc-home-y-lbl').textContent = t('sanctionYellow')
    document.getElementById('sanc-home-r-lbl').textContent = t('sanctionRed')
    document.getElementById('sanc-away-r-lbl').textContent = t('sanctionRed')
    document.getElementById('sanc-away-y-lbl').textContent = t('sanctionYellow')
  }

  // Timer label
  if(document.getElementById('timer-label')){
    document.getElementById('timer-label').textContent = t('timerLabel')
  }

  renderTabs()
  renderLog()
  renderPending()
}

function renderTabs(){
  const tabs = document.getElementById('tabs')
  tabs.innerHTML = ''
  S.sets.forEach((s,i)=>{
    const btn = document.createElement('button')
    btn.className = 'tab ' + (i===S.cur ? 'active' : s.status==='finished' ? 'done' : 'pending')
    btn.textContent = s.status==='finished' ? `${s.home}-${s.away}` : t('set', s.num)
    btn.onclick = ()=>{ S.cur=i; renderAll() }
    tabs.appendChild(btn)
  })
}

function renderLog(){
  const list = document.getElementById('log-list')
  const visible = [...S.events].reverse().slice(0,5)
  if(!visible.length){
    list.innerHTML = `<div id="log-empty" style="padding:8px 12px;font-size:11px;color:var(--faint);text-align:center">${t('logEmpty')}</div>`
    return
  }
  list.innerHTML = visible.map(e=>{
    const pt   = POINT_TYPE_META.find(p=>p.id===e.type)
    const side = e.side==='home' ? CLUBS.home : CLUBS.away
    const sName = LANG==='ar' ? side.name_ar : side.name_en
    const pNum = e.playerNum ? ` #${e.playerNum}` : ''
    const skillTxt = e.type!=='point' ? `<span class="log-type" style="color:${pt?.color||'#94a3b8'}"><span>${pt?.icon||'●'}</span><span>${ptLabel(e.type)}</span></span>` : ''
    return `<div class="log-item${e.undone?' undone':''}">
      <span style="color:${side.color};font-weight:600">${sName}${pNum}</span>
      ${skillTxt}
      <span style="color:var(--faint);font-variant-numeric:tabular-nums">${e.hAfter}—${e.aAfter}</span>
    </div>`
  }).join('')
}

/* ── Detail Mode Toggle ───────────────────────────────── */
function toggleDetailMode(){
  S.detailMode = document.getElementById('detail-check').checked
  localStorage.setItem('xura_detail_mode', S.detailMode?'1':'0')
}
// restore
if(localStorage.getItem('xura_detail_mode')==='1'){
  S.detailMode = true
  setTimeout(()=>{ document.getElementById('detail-check').checked = true },0)
}

/* ── Score / Overlay ──────────────────────────────────── */
function pressScore(side){
  if(S.matchDone) return
  const s = activeSet()
  if(s.status !== 'active') return
  S.selectedPlayer = null

  if(!S.detailMode){
    // Quick mode: add point directly, no overlay
    recordPoint(side, 'point')
    return
  }

  // Detail mode: show overlay with player + skill
  S.overlay = side
  openOverlay(side)
}

function openOverlay(side){
  document.getElementById('ov-club').style.color = CLUBS[side].color
  document.getElementById('ov-club').textContent = clubName(side)
  document.getElementById('ov-name').style.color = CLUBS[side].color
  document.getElementById('ov-name').textContent = clubName(side)
  document.getElementById('ov-hint').textContent = t('ovHint')
  document.getElementById('ov-sub').textContent  = t('ovSub')
  document.getElementById('ov-cancel').textContent = t('ovCancel')
  document.getElementById('ov-kbd').textContent  = t('ovKbd')

  showPlayerStep()
  buildGrid()
  document.getElementById('overlay').classList.add('open')
  startCountdown()
}

function showPlayerStep(){
  document.getElementById('player-step').classList.add('show')
  document.getElementById('type-step').style.display = 'none'
  document.getElementById('step-title').textContent = t('selectPlayer')
  document.getElementById('player-skip').textContent = t('skipPlayer')
  buildPlayerGrid()
}

function showTypeStep(){
  document.getElementById('player-step').classList.remove('show')
  document.getElementById('type-step').style.display = 'flex'
}

function buildPlayerGrid(){
  const grid = document.getElementById('player-grid')
  grid.innerHTML = ''
  for(let i=1;i<=16;i++){
    const btn = document.createElement('button')
    btn.className = 'pnum-btn'
    btn.textContent = i
    btn.onclick = ()=> selectPlayer(i)
    grid.appendChild(btn)
  }
}

function selectPlayer(num){
  S.selectedPlayer = num
  document.querySelectorAll('.pnum-btn').forEach(b=>b.classList.remove('selected'))
  event.target.classList.add('selected')
  setTimeout(()=>{
    showTypeStep()
    clearInterval(S.cdInterval)
    S.cdSec = 8
    startCountdown()
  }, 200)
}

function skipPlayer(){
  S.selectedPlayer = null
  showTypeStep()
  clearInterval(S.cdInterval)
  S.cdSec = 8
  startCountdown()
}

function buildGrid(){
  const grid = document.getElementById('ov-grid')
  grid.innerHTML = ''
  POINT_TYPE_META.forEach(pt=>{
    const btn = document.createElement('button')
    btn.className = 'pt-btn'
    btn.style.cssText = `background:${pt.bg};border-color:${pt.border}`
    btn.innerHTML = `<span class="ic" style="color:${pt.color}">${pt.icon}</span>
      <span class="lb" style="color:#e2e8f0">${ptLabel(pt.id)}</span>
      <span class="sk">[${pt.shortcut}]</span>`
    btn.onclick = ()=>confirmType(pt.id)
    grid.appendChild(btn)
  })
}

/* ── Sync ──────────────────────────────────────────────── */
function syncMatchState() {
  if (!window.firebaseConfigured || !URL_MATCH_ID) return;
  const s = activeSet();
  const setScores = S.sets.map(x => ({ num: x.num, home: x.home, away: x.away, finished: x.status === 'finished' }));
  window.updateDocFirebaseDB(window.docFirebaseDB(window.db, 'matches', URL_MATCH_ID), {
    currentHomeScore: s.home,
    currentAwayScore: s.away,
    currentSetNum: S.cur + 1,
    homeSets: S.setsWon.home,
    awaySets: S.setsWon.away,
    setScores: setScores,
    lastUpdate: new Date().toISOString()
  });
}

function startCountdown(){
  S.cdSec = 8
  updateRing()
  clearInterval(S.cdInterval)
  S.cdInterval = setInterval(()=>{
    S.cdSec--
    updateRing()
    if(S.cdSec <= 0){ clearInterval(S.cdInterval); confirmType('other') }
  }, 1000)
}

function updateRing(){
  const ring = document.getElementById('cd-ring')
  const num  = document.getElementById('cd-num')
  const progress = (S.cdSec / 8) * S.circumference
  ring.style.strokeDashoffset = String(S.circumference - progress)
  ring.style.stroke = S.cdSec <= 3 ? '#ef4444' : '#334155'
  num.style.color   = S.cdSec <= 3 ? '#ef4444' : '#94a3b8'
  num.textContent   = String(S.cdSec)
}

function closeOverlay(){
  clearInterval(S.cdInterval)
  S.overlay = null
  document.getElementById('overlay').classList.remove('open')
}

function confirmType(typeId){
  if(!S.overlay) return
  clearInterval(S.cdInterval)
  const side = S.overlay
  closeOverlay()
  recordPoint(side, typeId)
}

function recordPoint(side, typeId){
  const s = activeSet()
  if(s.status !== 'active') return
  if(side==='home') s.home++; else s.away++

  const area = document.getElementById('score-area')
  area.classList.remove('flash-home','flash-away')
  void area.offsetWidth
  area.classList.add(side==='home'?'flash-home':'flash-away')

  const el = document.getElementById(side==='home'?'sh':'sa')
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump')

  // Update serving side: scorer keeps serve, loser gives it
  const prevServing = S.serving
  S.serving = side
  if(S.serving === prevServing) S.serveRun++
  else S.serveRun = 1

  // Start set timer on first point
  if(!S.setStartTime && !S.matchDone){
    S.setStartTime = Date.now()
    clearInterval(S.timerInterval)
    S.timerInterval = setInterval(updateTimer, 1000)
    const dot = document.getElementById('timer-dot')
    if(dot) dot.style.display = 'block'
  }

  const evtId = 'evt_' + Date.now() + '_' + Math.floor(Math.random()*1000);
  const evt = { id: evtId, side, type:typeId, hAfter:s.home, aAfter:s.away, setNum:s.num, undone:false }
  if(S.selectedPlayer) evt.playerNum = S.selectedPlayer
  S.events.push(evt)

  if (window.firebaseConfigured) {
    const qEvt = {
      matchId: URL_MATCH_ID,
      scoring_side: side,
      home_score_after: s.home,
      away_score_after: s.away,
      point_type: typeId,
      set_num: s.num,
      recorded_at: new Date().toISOString(),
      undone: false
    }
    if(S.selectedPlayer) qEvt.player_num = S.selectedPlayer
    window.setDocFirebaseDB(window.docFirebaseDB(window.db, 'events', evtId), qEvt)
  }

  S.selectedPlayer = null
  renderAll()
  checkSetWinner()
  syncMatchState()
}

function checkSetWinner(){
  const s = activeSet()
  if(s.status !== 'active') return
  
  const limit = s.num < 5 ? 25 : 15
  if(Math.max(s.home, s.away) >= limit && Math.abs(s.home - s.away) >= 2){
    endSet() // Immediate transition
  }
}

/* ── Decrement ────────────────────────────────────────── */
function decrementScore(side){
  if(S.matchDone) {
    S.matchDone = false
    document.getElementById('match-over').classList.remove('show')
    if (window.firebaseConfigured) {
      window.updateDocFirebaseDB(window.docFirebaseDB(window.db, 'matches', URL_MATCH_ID), {
        status: 'live',
        score: null
      });
    }
  }

  let s = activeSet()
  
  // If we are at 0-0 in a new set, maybe the referee wants to decrement the PREVIOUS set score!
  if(s[side] === 0 && S.cur > 0 && S.sets[S.cur].home === 0 && S.sets[S.cur].away === 0) {
    S.sets[S.cur].status = 'pending'
    S.cur--
    s = activeSet()
    s.status = 'active'
    if(s.winner){
      S.setsWon[s.winner]--
      s.winner = null
    }
  }

  if(s[side] > 0){
    s[side]--
    
    // Add an event to the queue so the live app syncs the new lowered score
    const evt = { id:Date.now(), side, type:'correction', hAfter:s.home, aAfter:s.away, setNum:s.num, undone:false }
    S.events.push(evt)
    enqueue({
      scoring_side: side,
      home_score_after: s.home,
      away_score_after: s.away,
      point_type: 'point',
      set_num: s.num,
      recorded_at: new Date().toISOString(),
      is_correction: true
    })
    
    renderAll()
    syncMatchState()
  }
}

/* ── Undo ─────────────────────────────────────────────── */
function undoLast(){
  if(S.matchDone){
    S.matchDone = false
    document.getElementById('match-over').classList.remove('show')
    if (window.firebaseConfigured) {
      window.updateDocFirebaseDB(window.docFirebaseDB(window.db, 'matches', URL_MATCH_ID), {
        status: 'live',
        score: null
      });
    }
  }

  const last = [...S.events].reverse().find(e=>!e.undone)
  if(!last) return
  last.undone = true

  const s = S.sets[last.setNum - 1]
  
  if(s.status === 'finished'){
    s.status = 'active'
    if(s.winner){
      S.setsWon[s.winner]--
      s.winner = null
    }
    S.cur = last.setNum - 1
    // Reset any future sets that might have been activated
    for(let i=S.cur+1; i<5; i++){
      S.sets[i].home = 0
      S.sets[i].away = 0
      S.sets[i].status = 'pending'
      S.sets[i].winner = null
    }
  } else if (s.status === 'ending') {
    s.status = 'active'
  }

  if(last.side==='home') s.home = Math.max(0, s.home-1)
  else                   s.away = Math.max(0, s.away-1)
  
  if (window.firebaseConfigured) {
    window.updateDocFirebaseDB(window.docFirebaseDB(window.db, 'events', last.id), { undone: true });
  }

  renderAll()
  showToast(t('undone'))
  syncMatchState()
}

/* ── Set Timer ───────────────────────────────────────── */
function updateTimer(){
  if(!S.setStartTime) return
  const elapsed = Math.floor((Date.now() - S.setStartTime) / 1000)
  const m = String(Math.floor(elapsed/60)).padStart(2,'0')
  const s2 = String(elapsed%60).padStart(2,'0')
  const el = document.getElementById('set-timer')
  if(el) el.textContent = `${m}:${s2}`
}

/* ── Substitution ─────────────────────────────────────── */
function recordSub(side){
  if(S.matchDone) return
  const s = activeSet()
  if(s.status !== 'active') return
  if(S.subs[side] <= 0){ showToast(t('subNone')); return }
  S.subs[side]--
  const name = clubName(side)
  showToast(t('subToast', name, S.subs[side]))
  if(window.firebaseConfigured){
    const id = 'sub_' + Date.now()
    window.setDocFirebaseDB(window.docFirebaseDB(window.db,'events',id),{
      matchId: URL_MATCH_ID, scoring_side: side,
      point_type: 'substitution', set_num: s.num,
      home_score_after: s.home, away_score_after: s.away,
      recorded_at: new Date().toISOString(), undone: false, is_sub: true,
      subs_remaining: S.subs[side]
    })
  }
  renderAll()
}

/* ── Sanction ─────────────────────────────────────────── */
function recordSanction(side, card){
  if(S.matchDone) return
  const s = activeSet()
  const name = clubName(side)
  if(card === 'yellow'){
    showToast(t('sanctionYellowToast', name))
  } else {
    // Red card = point for opponent
    const opp = side === 'home' ? 'away' : 'home'
    showToast(t('sanctionRedToast', name))
    recordPoint(opp, 'opponent_error')
  }
  if(window.firebaseConfigured){
    const id = 'sanc_' + Date.now()
    window.setDocFirebaseDB(window.docFirebaseDB(window.db,'events',id),{
      matchId: URL_MATCH_ID, scoring_side: side,
      point_type: card === 'yellow' ? 'yellow_card' : 'red_card',
      set_num: s.num, home_score_after: s.home, away_score_after: s.away,
      recorded_at: new Date().toISOString(), undone: false, is_sanction: true, card
    })
  }
  if(card === 'yellow') renderAll()
}

/* ── Time Out ─────────────────────────────────────────── */
function recordTimeout(side){
  if(S.matchDone) return
  const s = activeSet()
  if(s.status !== 'active') return
  if(S.timeouts[side] <= 0){ showToast(t('timeoutNone')); return }

  S.timeouts[side]--

  const name = clubName(side)
  showToast(t('timeoutToast', name))

  // Save to Firestore as a special event
  if(window.firebaseConfigured){
    const toId = 'to_' + Date.now() + '_' + Math.floor(Math.random()*1000)
    window.setDocFirebaseDB(window.docFirebaseDB(window.db, 'events', toId), {
      matchId: URL_MATCH_ID,
      scoring_side: side,
      point_type: 'timeout',
      home_score_after: s.home,
      away_score_after: s.away,
      set_num: s.num,
      recorded_at: new Date().toISOString(),
      undone: false,
      is_timeout: true,
      timeouts_remaining: S.timeouts[side]
    })
    // Update match doc with timeout count
    window.updateDocFirebaseDB(window.docFirebaseDB(window.db, 'matches', URL_MATCH_ID), {
      [`timeouts_${side}_set${s.num}`]: S.timeouts[side]
    })
  }

  renderAll()
}

/* ── End Set ──────────────────────────────────────────── */
function endSet(){
  const s = activeSet()
  if(s.status !== 'active' && s.status !== 'ending') return
  s.status = 'finished'
  s.winner = s.home >= s.away ? 'home' : 'away'
  S.setsWon[s.winner]++
  if(S.setsWon.home===3 || S.setsWon.away===3){
    S.matchDone = true; 
    const finalScore = `${S.setsWon.home} - ${S.setsWon.away}`;
    if (window.firebaseConfigured) {
      window.updateDocFirebaseDB(window.docFirebaseDB(window.db, 'matches', URL_MATCH_ID), {
        status: 'finished',
        score: finalScore,
        homeSets: S.setsWon.home,
        awaySets: S.setsWon.away,
        dateFinished: new Date().toISOString()
      });
    }
    renderAll(); showMatchOver(); return
  }
  if(S.cur < 4){ S.cur++; S.sets[S.cur].status = 'active' }
  // Reset per-set counters for next set
  S.timeouts = { home: 2, away: 2 }
  S.subs     = { home: 6, away: 6 }
  S.serveRun = 0
  // Stop and reset timer
  clearInterval(S.timerInterval)
  S.timerInterval = null
  S.setStartTime  = null
  const timerEl = document.getElementById('set-timer')
  if(timerEl) timerEl.textContent = '00:00'
  const dot = document.getElementById('timer-dot')
  if(dot) dot.style.display = 'none'
  renderAll()
  showToast(t('setEnded', s.num, S.sets[S.cur].num))
  syncMatchState()
}

/* ── Match Over ───────────────────────────────────────── */
function showMatchOver(){
  const winner = S.setsWon.home >= S.setsWon.away ? clubName('home') : clubName('away')
  document.getElementById('mo-title').textContent  = t('matchOver')
  
  const titleHtml = t('matchWon', winner, S.setsWon.home, S.setsWon.away)
  const setsScores = S.sets.filter(s=>s.status==='finished').map(s => `${s.home}–${s.away}`).join(', ')
  
  document.getElementById('mo-result').innerHTML = `
    ${titleHtml}
    <div style="font-size:16px;color:var(--text3);font-variant-numeric:tabular-nums">${setsScores}</div>
  `
  document.getElementById('mo-new').textContent    = t('newMatch')
  
  // Add View Details button
  const actions = document.querySelector('#overlay .card-actions') || document.getElementById('mo-new').parentElement;
  if (actions) {
    // Check if button already exists
    if (!document.getElementById('mo-details')) {
      const btn = document.createElement('button');
      btn.id = 'mo-details';
      btn.className = 'btn';
      btn.style.cssText = 'background:var(--surface2);color:var(--text2);margin-top:10px';
      btn.textContent = LANG === 'ar' ? 'عرض تفاصيل المباراة' : 'View Match Details';
      btn.onclick = () => window.open(`index.html?matchId=${URL_MATCH_ID}`, '_blank');
      actions.appendChild(btn);
    }
  }
  document.getElementById('match-over').classList.add('show')
}

function resetMatch(){
  window.location.href = 'match-setup.html'
}

/* ── Toast ────────────────────────────────────────────── */
function showToast(msg){
  let toast = document.getElementById('xura-toast')
  if(!toast){
    toast = document.createElement('div')
    toast.id = 'xura-toast'
    toast.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
      background:#1e293b;color:#e2e8f0;padding:8px 18px;border-radius:20px;
      font-size:12px;z-index:100;transition:opacity .3s;pointer-events:none`
    document.body.appendChild(toast)
  }
  toast.textContent = msg; toast.style.opacity = '1'
  clearTimeout(toast._t)
  toast._t = setTimeout(()=>{ toast.style.opacity='0' }, 1800)
}

/* ── Keyboard ─────────────────────────────────────────── */
document.addEventListener('keydown', e=>{
  if(document.getElementById('overlay').classList.contains('open')){
    if(e.key==='Escape'){ closeOverlay(); return }
    const pt = POINT_TYPE_META.find(p=>p.shortcut===e.key)
    if(pt) confirmType(pt.id)
  } else {
    if(e.key==='h'||e.key==='H') pressScore('home')
    if(e.key==='a'||e.key==='A') pressScore('away')
    if(e.key==='z'||e.key==='Z') undoLast()
    if(e.key==='Enter')          endSet()
    if(e.key==='l'||e.key==='L') toggleLang()
  }
})

document.getElementById('overlay').addEventListener('click', closeOverlay)

/* ── Init ─────────────────────────────────────────────── */
window.initFirestoreSync = async function() {
  // 1. Check Login
  const savedRef = sessionStorage.getItem('xura_referee');
  if (!savedRef) {
    window.location.href = 'xura-referee-login.html';
    return;
  }
  const loggedInRef = JSON.parse(savedRef);

  if (window.firebaseConfigured) {
    const docSnap = await window.getDocFirebaseDB(window.docFirebaseDB(window.db, 'matches', URL_MATCH_ID));
    if (docSnap.exists()) {
      matchData = docSnap.data();

      // 2. Check Permission
      if (matchData.assignedReferee !== loggedInRef.id) {
        document.body.innerHTML = `
          <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px">
            <h1 style="color:var(--red);margin-bottom:16px">Access Denied</h1>
            <p>${LANG === 'ar' ? 'عذراً، لست الحكم المعين لهذه المباراة' : 'You are not the assigned referee for this match'}</p>
            <button onclick="window.location.href='/profile'" class="sec-btn" style="margin-top:20px">العودة للملف الشخصي</button>
          </div>
        `;
        return;
      }

      document.getElementById('ref-display').textContent = loggedInRef.name_ar;

      CLUBS = {
        home: { ...matchData.home, btnClass: 'home' },
        away: { ...matchData.away, btnClass: 'away' }
      };
      
      document.documentElement.style.setProperty('--teal', CLUBS.home.color);
      document.documentElement.style.setProperty('--teal-bg', CLUBS.home.color + '33');
      document.documentElement.style.setProperty('--teal-dark', CLUBS.home.color + '1a');
      document.documentElement.style.setProperty('--blue', CLUBS.away.color);
      document.documentElement.style.setProperty('--blue-bg', CLUBS.away.color + '33');
      document.documentElement.style.setProperty('--blue-dark', CLUBS.away.color + '1a');
      
      applyDir();
      updateOnline();
      renderAll();
      
      // Heartbeat for live dashboard
      setInterval(() => {
        if (window.firebaseConfigured && navigator.onLine) {
          window.setDocFirebaseDB(window.docFirebaseDB(window.db, 'referees', URL_MATCH_ID), { lastActive: Date.now(), matchId: URL_MATCH_ID });
        }
      }, 5000);
    } else {
      window.location.href = "match-setup.html";
    }
  }
}
// Robust initialization: Wait for Firebase to be ready
const initInterval = setInterval(() => {
  if (window.firebaseConfigured) {
    clearInterval(initInterval);
    window.initFirestoreSync();
  }
}, 500);

// Also try immediately just in case
if (window.firebaseConfigured) {
  // We wait for the Auth observer in the script tag to call this
}

let setupPinValue = '';
function showPinSetup() {
  document.getElementById('pin-setup').style.display = 'flex';
}
window.setupPinPress = function(n) {
  if (setupPinValue.length < 4) {
    setupPinValue += n;
    updateSetupDots();
  }
};
window.setupPinClear = function() {
  setupPinValue = setupPinValue.slice(0, -1);
  updateSetupDots();
};
function updateSetupDots() {
  const dots = document.querySelectorAll('#pin-setup-dots .dot');
  dots.forEach((d, i) => {
    d.style.background = i < setupPinValue.length ? 'var(--teal)' : 'transparent';
    d.style.borderColor = i < setupPinValue.length ? 'var(--teal)' : 'var(--surface2)';
  });
}
window.setupPinSubmit = async function() {
  if (setupPinValue.length !== 4) {
    document.getElementById('pin-setup-status').textContent = 'يجب إدخال 4 أرقام';
    return;
  }
  document.getElementById('pin-setup-status').style.color = 'var(--teal)';
  document.getElementById('pin-setup-status').textContent = 'جاري الحفظ...';
  await window.updateRefereePin(setupPinValue);
};
