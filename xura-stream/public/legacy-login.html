<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>XURA — بوابة الدخول</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#020617;--surface:rgba(15,23,42,0.7);--border:rgba(51,65,85,0.4);
    --teal:#14b8a6;--blue:#3b82f6;--text:#f8fafc;--text2:#94a3b8;
  }
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
  .glow{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
  .glow-1{width:500px;height:500px;top:-200px;right:-100px;background:radial-gradient(circle,rgba(20,184,166,0.12),transparent 70%)}
  .glow-2{width:400px;height:400px;bottom:-150px;left:-100px;background:radial-gradient(circle,rgba(59,130,246,0.1),transparent 70%)}
  
  .card{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:40px 32px;
    width:100%;max-width:400px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    box-shadow:0 24px 64px rgba(0,0,0,0.5);text-align:center;position:relative;z-index:1}
  .brand h1{font-size:32px;font-weight:900;letter-spacing:3px;margin-bottom:8px;
    background:linear-gradient(135deg,var(--teal),#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .brand p{font-size:14px;color:var(--text2);margin-bottom:32px}
  
  .choice-btn{display:flex;align-items:center;gap:16px;width:100%;padding:20px;
    background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:18px;
    color:var(--text);text-decoration:none;margin-bottom:16px;transition:all .2s;text-align:right}
  .choice-btn:hover{background:rgba(255,255,255,0.08);border-color:var(--teal);transform:translateY(-2px)}
  .choice-btn:active{transform:scale(.98)}
  .icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
  .icon.ref{background:rgba(20,184,166,0.15);color:var(--teal)}
  .icon.adm{background:rgba(59,130,246,0.15);color:var(--blue)}
  .text h3{font-size:16px;font-weight:700;margin-bottom:2px}
  .text p{font-size:12px;color:var(--text2)}

  .back-link{display:inline-block;margin-top:20px;color:var(--text2);font-size:13px;text-decoration:none}
  .back-link:hover{color:var(--text)}
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="card">
  <div class="brand">
    <h1>XURA</h1>
    <p>اختر نوع تسجيل الدخول</p>
  </div>
  
  <a href="referee-login.html" class="choice-btn">
    <div class="icon ref">📱</div>
    <div class="text">
      <h3>تسجيل دخول الحكم</h3>
      <p>لبدء تسجيل نقاط المباراة</p>
    </div>
  </a>

  <a href="admin-login.html" class="choice-btn">
    <div class="icon adm">🛡️</div>
    <div class="text">
      <h3>تسجيل دخول المسؤول</h3>
      <p>لإعداد المباريات وإدارة البيانات</p>
    </div>
  </a>

  <a href="index.html" class="back-link">← العودة للوحة النتائج</a>
</div>
</body>
</html>
