<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#03071e">
<title>XURA Live — Results</title>
<style>
/* ── Reset & Tokens ──────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03071e;--bg2:#060d27;--bg3:#0a1535;
  --surface:#0f1f3d;--surface2:#162447;--border:#1a2f57;--border2:#243b6a;
  --teal:#5eead4;--teal-mid:#0d9488;--teal-dark:#134e4a;
  --blue:#60a5fa;--blue-mid:#2563eb;--blue-dark:#1e3a5f;
  --amber:#fbbf24;--amber-dark:#92400e;
  --green:#4ade80;--red:#f87171;--purple:#a78bfa;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --r:10px;--r2:16px;--r3:24px;
  --tr:.2s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Noto Sans Arabic','Segoe UI',system-ui,sans-serif;
  font-size:15px;line-height:1.6;overflow-x:hidden}
button,input,select{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
#shell{min-height:100dvh;display:flex;flex-direction:column}

/* ── Nav ────────────────────────────────────────────────── */
#topnav{
  position:sticky;top:0;z-index:100;
  background:rgba(3,7,30,.92);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;padding:0 16px;height:56px;
}
.nav-logo{font-size:18px;font-weight:900;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--teal),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.nav-tabs{display:flex;gap:2px;flex:1;justify-content:center}
.nav-tab{padding:7px 12px;border-radius:var(--r);border:none;cursor:pointer;
  font-size:13px;font-weight:500;background:transparent;color:var(--text2);transition:var(--tr)}
.nav-tab:hover{background:var(--surface);color:var(--text)}
.nav-tab.active{background:var(--surface2);color:var(--teal);font-weight:700}
.nav-right{display:flex;align-items:center;gap:8px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-badge{font-size:11px;color:var(--red);font-weight:700;letter-spacing:.05em}
.conn-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600}
.conn-badge.on{background:#052e16;color:var(--green)}
.conn-badge.off{background:#2d1515;color:var(--red)}
#lang-toggle{
  padding:4px 10px;border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--teal);font-size:11px;font-weight:700;
  cursor:pointer;transition:var(--tr);letter-spacing:.05em}
#lang-toggle:hover{background:var(--surface)}

/* ── Layout ─────────────────────────────────────────────── */
#main{flex:1;padding:24px 20px;max-width:1280px;margin:0 auto;width:100%}
.view{display:none}.view.active{display:block}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-hd h2{font-size:17px;font-weight:700}
.sec-hd small{font-size:12px;color:var(--text3)}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

/* ── Match Card ─────────────────────────────────────────── */
.match-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:var(--tr);position:relative}
.match-card:hover{border-color:var(--teal-mid);transform:translateY(-2px)}
.match-card.is-live{border-color:var(--red);border-inline-start:3px solid var(--red)}
.match-card.is-live::before{content:'';position:absolute;inset-inline:0;top:0;height:2px;
  background:linear-gradient(90deg,var(--red),transparent);animation:shimmer 2s linear infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.mc-header{padding:10px 16px;background:var(--bg3);display:flex;align-items:center;justify-content:space-between}
.mc-tournament{font-size:11px;color:var(--text3);font-weight:500}
.mc-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.mc-status.live{background:#2d1515;color:var(--red)}
.mc-status.finished{background:var(--surface2);color:var(--text3)}
.mc-status.scheduled{background:var(--teal-dark);color:var(--teal)}
.mc-body{padding:16px}
.mc-clubs{display:flex;align-items:center;justify-content:space-between;gap:12px}
.mc-club{text-align:center;flex:1}
.mc-club-name{font-size:14px;font-weight:700;margin-bottom:6px}
.mc-score{font-size:44px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-2px}
.mc-score.home{color:var(--teal)}.mc-score.away{color:var(--blue)}
.mc-divider{font-size:18px;color:var(--text3);align-self:center;padding-bottom:6px}
.mc-sets{font-size:11px;color:var(--text3);text-align:center;margin-top:4px}
.mc-footer{padding:8px 16px;background:var(--bg2);display:flex;align-items:center;
  justify-content:space-between;border-top:1px solid var(--border)}
.mc-footer-txt{font-size:11px;color:var(--text3)}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}70%{box-shadow:0 0 0 10px rgba(248,113,113,0)}100%{box-shadow:0 0 0 0 rgba(248,113,113,0)}}
.pulse-ring{animation:ring 2s ease-out infinite}

/* ── Match Card Set Details ─────────────────────────────── */
.mc-scoreboard{display:flex;flex-direction:column;font-size:12px;background:var(--bg2);border-top:1px solid var(--border)}
.mcs-row{display:flex;align-items:center;border-bottom:1px solid var(--border)}
.mcs-row:last-child{border-bottom:none}
.mcs-header{color:var(--text3);font-size:10px;text-transform:uppercase;background:var(--bg3)}
.mcs-team{flex:1;padding:8px 16px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.mcs-set{width:36px;text-align:center;padding:8px 0;border-inline-start:1px solid var(--border);color:var(--text2);font-variant-numeric:tabular-nums}
.mcs-set.active{background:rgba(13,148,136,.1);color:var(--text)}
.mcs-set.won-h{color:var(--teal);font-weight:700}
.mcs-set.won-a{color:var(--blue);font-weight:700}
.mcs-total{width:46px;font-weight:700;color:var(--text)}
.mcs-sets-won{font-size:15px;font-weight:900}
.mcs-sets-won.home{color:var(--teal)}.mcs-sets-won.away{color:var(--blue)}
.mc-match-info{padding:8px 16px;background:var(--bg3);font-size:11px;color:var(--text3);text-align:center}

/* ── Detail Hero ─────────────────────────────────────────── */
.detail-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;margin-bottom:20px}
.dh-bar{background:var(--bg3);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.dh-tournament{font-size:12px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.dh-score-block{padding:28px 24px;display:flex;align-items:center;justify-content:center;gap:32px}
.dh-team{text-align:center;flex:1;max-width:200px}
.dh-team-name{font-size:16px;font-weight:700;margin-bottom:10px}
.dh-score{font-size:96px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-4px}
.dh-score.home{color:var(--teal)}.dh-score.away{color:var(--blue)}
.dh-sep{font-size:40px;color:var(--border2);font-weight:200;padding-bottom:12px}
.set-breakdown{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:6px}
.sb-item{flex:1;text-align:center;background:var(--bg3);border-radius:var(--r);padding:8px;border:1px solid var(--border)}
.sb-item.active{border-color:var(--teal-mid)}
.sb-num{font-size:10px;color:var(--text3);margin-bottom:4px}
.sb-score{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}

/* ── Point Log ───────────────────────────────────────────── */
.point-log{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.pl-header{padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center}
.pl-header h3{font-size:14px;font-weight:600}
.pl-body{max-height:320px;overflow-y:auto}
.pl-item{display:flex;align-items:center;gap:12px;padding:9px 16px;
  border-bottom:1px solid var(--border);animation:fadeSlide .25s ease;font-size:13px}
.pl-item:last-child{border-bottom:none}
@keyframes fadeSlide{from{transform:translateY(-6px);opacity:0}to{opacity:1;transform:none}}
.pl-type-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.pl-club{font-weight:600;flex:1}
.pl-score{font-variant-numeric:tabular-nums;font-size:12px;color:var(--text3);background:var(--bg2);padding:2px 8px;border-radius:6px}
.pl-set{font-size:11px;color:var(--text3)}

/* ── Stats ───────────────────────────────────────────────── */
.stat-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-label{font-size:12px;color:var(--text2)}
.stat-bar-wrap{flex:1;margin:0 10px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;position:relative}
.stat-bar{height:100%;border-radius:3px;transition:width .6s ease}
.stat-val{font-size:12px;font-weight:600;min-width:24px;text-align:start}

/* ── Dashboard ───────────────────────────────────────────── */
.dash-kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:-20px;inset-inline-start:-20px;width:80px;height:80px;border-radius:50%;opacity:.06}
.kpi.teal::before{background:var(--teal)}.kpi.blue::before{background:var(--blue)}
.kpi.amber::before{background:var(--amber)}.kpi.purple::before{background:var(--purple)}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.kpi-val{font-size:32px;font-weight:900;line-height:1;margin-bottom:4px}
.kpi.teal .kpi-val{color:var(--teal)}.kpi.blue .kpi-val{color:var(--blue)}
.kpi.amber .kpi-val{color:var(--amber)}.kpi.purple .kpi-val{color:var(--purple)}
.kpi-sub{font-size:11px;color:var(--text3)}
.activity-feed{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.af-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.af-header h3{font-size:14px;font-weight:700}
.af-item{display:flex;align-items:flex-start;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);animation:fadeSlide .3s ease}
.af-item:last-child{border-bottom:none}
.af-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.af-text{font-size:13px;color:var(--text2);line-height:1.5;flex:1}
.af-time{font-size:11px;color:var(--text3);white-space:nowrap}
.match-control{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.mc-panel-hdr{padding:14px 18px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mc-panel-hdr h3{font-size:14px;font-weight:700}
.status-tag{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:700}
.status-tag.live{background:#2d1515;color:var(--red)}
.status-tag.finished{background:var(--surface2);color:var(--text3)}
.ref-link{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px}
.ref-link-icon{width:36px;height:36px;border-radius:var(--r);background:var(--teal-dark);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ref-link-text{flex:1}
.ref-link-title{font-size:13px;font-weight:600;margin-bottom:2px}
.ref-link-sub{font-size:11px;color:var(--text3)}
.ref-link-pulse{width:10px;height:10px;border-radius:50%}
.ref-link-pulse.active{background:var(--green);animation:blink 1s infinite}
.ref-link-pulse.inactive{background:var(--text3)}

/* ── Standings ───────────────────────────────────────────── */
.standings-table{width:100%;border-collapse:collapse;font-size:13px}
.standings-table th{padding:10px 14px;background:var(--bg3);color:var(--text3);font-size:11px;
  text-align:center;border-bottom:1px solid var(--border);font-weight:600;letter-spacing:.05em}
.standings-table th:first-child,.standings-table td:first-child,.standings-table td:nth-child(2){text-align:start}
.standings-table td{padding:12px 14px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.standings-table tr:hover td{background:var(--surface2)}
.standings-table tr:last-child td{border-bottom:none}
.st-rank{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.st-rank.r1{background:var(--amber-dark);color:var(--amber)}
.st-rank.r2{background:#1c2535;color:#94a3b8}
.st-rank.r3{background:#1e1510;color:#cd7c3e}
.st-rank.rn{background:var(--surface2);color:var(--text3)}
.st-form{display:flex;gap:3px}
.sf-w{width:14px;height:14px;border-radius:3px;background:var(--teal-dark);font-size:8px;color:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:700}
.sf-l{width:14px;height:14px;border-radius:3px;background:#2d1515;font-size:8px;color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700}

/* ── Empty ───────────────────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .big{font-size:40px;margin-bottom:12px;opacity:.3}
.empty p{font-size:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;transition:var(--tr)}

@media(max-width:640px){
  #main{padding:16px 12px}
  .dh-score{font-size:72px}
  .grid-2{grid-template-columns:1fr}
  .nav-tab{padding:7px 8px;font-size:11px}
  #lang-toggle{font-size:10px;padding:3px 7px}
}
</style>

  </script>
</head>
<body>
<div id="shell">

  <!-- Nav -->
  <nav id="topnav">
    <div class="nav-right">
      <div class="live-dot"></div>
      <span class="live-badge" id="nav-live-label">LIVE</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-view="home" id="tab-home"></button>
      <button class="nav-tab" data-view="standings" id="tab-standings"></button>
      <button class="nav-tab" data-view="detail" id="detail-tab" style="display:none"></button>
      
      <!-- Admin/Referee Tabs (Conditional) -->
      <div id="admin-tabs" style="display:none; gap:2px; border-inline-start:1px solid var(--border); padding-inline-start:10px; margin-inline-start:10px">
        <a href="match-setup.html" class="nav-tab" style="text-decoration:none">إعداد مباراة</a>
        <a href="xura-referee-login.html" class="nav-tab" style="text-decoration:none">تطبيق الحكم</a>
        <a href="xura-db-manager.html" class="nav-tab" style="text-decoration:none">مدير البيانات</a>
      </div>
      
      <button class="nav-tab" data-view="dashboard" id="tab-dashboard"></button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-inline-start:8px">
      <button id="lang-toggle" onclick="toggleLang()"></button>
      <span id="conn-badge" class="conn-badge off"></span>
    </div>
    <div class="nav-logo" onclick="navigate('home')" style="margin-inline-start:12px">XURA</div>
  </nav>

  <div id="main">

    <!-- ── HOME ── -->
    <div id="view-home" class="view active">
      <div class="sec-hd">
        <h2 id="home-title"></h2>
        <small id="last-update-txt"></small>
      </div>
      <div class="grid-2" id="live-cards" style="margin-bottom:28px">
        <div class="empty" id="live-empty"><div class="big">⚡</div><p id="live-empty-txt"></p></div>
      </div>
      <div class="sec-hd"><h2 id="upcoming-title"></h2></div>
      <div class="grid-2" id="upcoming-cards"></div>
    </div>

    <!-- ── STANDINGS ── -->
    <div id="view-standings" class="view">
      <div class="sec-hd" style="margin-bottom:20px">
        <h2 id="standings-title"></h2>
        <select id="tourn-select" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:var(--r);font-size:13px"></select>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden">
        <table class="standings-table">
          <thead id="standings-head"></thead>
          <tbody id="standings-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ── DETAIL ── -->
    <div id="view-detail" class="view">
      <button class="back-btn" onclick="navigate('home')"
        style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer;
               margin-bottom:20px;background:none;border:none;padding:0"
        id="detail-back"></button>
      <div class="detail-hero">
        <div class="dh-bar">
          <span class="dh-tournament" id="d-tournament"></span>
          <span id="d-status-badge" style="font-size:11px;font-weight:600"></span>
        </div>
        <div class="dh-score-block">
          <div class="dh-team"><div class="dh-team-name" id="d-home-name"></div>
            <div class="dh-score home" id="d-home-score">0</div></div>
          <div class="dh-sep">:</div>
          <div class="dh-team"><div class="dh-team-name" id="d-away-name"></div>
            <div class="dh-score away" id="d-away-score">0</div></div>
        </div>
        <div class="set-breakdown" id="d-set-breakdown"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px" id="detail-stats-wrap"></div>
      <div class="point-log">
        <div class="pl-header">
          <h3 id="log-title-d"></h3>
          <span id="pl-count" style="font-size:12px;color:var(--text3)"></span>
        </div>
        <div class="pl-body" id="point-log-body"></div>
      </div>
    </div>

    <!-- ── DASHBOARD ── -->
    <div id="view-dashboard" class="view">
      <div class="dash-kpi-grid">
        <div class="kpi teal"><div class="kpi-label" id="kpi-live-lbl"></div><div class="kpi-val" id="kpi-live">0</div><div class="kpi-sub" id="kpi-live-sub"></div></div>
        <div class="kpi blue"><div class="kpi-label" id="kpi-pts-lbl"></div><div class="kpi-val" id="kpi-pts">0</div><div class="kpi-sub" id="kpi-pts-sub"></div></div>
        <div class="kpi amber"><div class="kpi-label" id="kpi-sets-lbl"></div><div class="kpi-val" id="kpi-sets">0</div><div class="kpi-sub" id="kpi-sets-sub"></div></div>
        <div class="kpi purple"><div class="kpi-label" id="kpi-refs-lbl"></div><div class="kpi-val" id="kpi-refs">0</div><div class="kpi-sub" id="kpi-refs-sub"></div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start" id="dash-cols">
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="match-control" id="dash-matches-panel">
            <div class="mc-panel-hdr">
              <h3 id="dash-active-title"></h3>
              <span id="dash-active-count" style="font-size:12px;color:var(--text3)"></span>
            </div>
            <div id="dash-matches-list" style="padding:0">
              <div id="dash-no-match" style="padding:24px;text-align:center;color:var(--text3);font-size:13px"></div>
            </div>
          </div>
          <div class="card">

function navigate(view, data=null){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'))
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'))
  const el = document.getElementById(`view-${view}`)

  el.classList.add('active')
  APP.currentView = view
  const tab = document.querySelector(`[data-view="${view}"]`)
  if(tab) tab.classList.add('active')
  
  if(view==='detail'){
    document.getElementById('detail-tab').style.display='flex'
    const matchId = (typeof data === 'string' ? data : null) || APP.selectedMatchId || URL_MATCH_ID;
    
    if(matchId){
      if(matchId !== APP.selectedMatchId){
        // Only reset and start new listener if it's a DIFFERENT match
        window.eventsData = []
        window.lastHeartbeat = null
        matchData = null
        APP.selectedMatchId = matchId
        listenToMatch(matchId)
      } else {
        // Same match - just ensure we render what we have
        pollReferee()
      }
      renderDetail() 
    } else {
      renderDetail() 
    }
  } else {
    document.getElementById('detail-tab').style.display='none'
  }
  if(view==='standings') renderStandings()
  if(view==='dashboard') renderDashboard()
}

/* ── Referee data bridge ─────────────────────────────────── */
window.eventsData = [];
window.lastHeartbeat = null;
window.historyMatches = [];
window.currentLiveMatches = [];

function readRefereeData(){
  return window.eventsData && window.eventsData.length ? { events: window.eventsData } : null;
}
function isConnected(){
  if (!APP.selectedMatchId && !URL_MATCH_ID) return true; // Default to on/online if no specific match selected
  return window.lastHeartbeat && Date.now() - parseInt(window.lastHeartbeat) < 20000;
}

function buildMatch(data){
  const events = (data?.events || []).filter(e=>!e.undone);
  const setMap = {};
  
  // 1. Start with setScores from the match document (most authoritative for totals)
  if (data?.setScores && Array.isArray(data.setScores)) {
    data.setScores.forEach(s => {
      setMap[s.num] = {
        num: s.num,
        homeScore: s.home,
        awayScore: s.away,
        finished: s.finished || false,
        winner: s.finished ? (s.home > s.away ? 'home' : 'away') : null
      };
    });
  }

  // 2. Overwrite/supplement with events if they provide more granular or newer info
  events.forEach(e => {
    const sn = e.set_num || 1;
    if (!setMap[sn]) {
      setMap[sn] = { num: sn, homeScore: 0, awayScore: 0, finished: false, winner: null };
    }
    // Only update if the event score is actually higher or it's the current set
    if (e.home_score_after > setMap[sn].homeScore) setMap[sn].homeScore = e.home_score_after;
    if (e.away_score_after > setMap[sn].awayScore) setMap[sn].awayScore = e.away_score_after;
  });

  // 3. Ensure current set is represented
  const curSetNum = data?.currentSetNum || 1;
  if (!setMap[curSetNum]) {
    setMap[curSetNum] = { num: curSetNum, homeScore: data?.currentHomeScore || 0, awayScore: data?.currentAwayScore || 0, finished: false, winner: null };
  } else {
    // If it exists, ensure it has the latest scores from the doc
    if (data?.currentHomeScore !== undefined) setMap[curSetNum].homeScore = data.currentHomeScore;
    if (data?.currentAwayScore !== undefined) setMap[curSetNum].awayScore = data.currentAwayScore;
  }
  
  const sets = Object.values(setMap).sort((a,b)=>a.num-b.num)

  let homeSets=0, awaySets=0
  sets.forEach(s=>{
    const limit = s.num<5?25:15
    if(Math.max(s.homeScore,s.awayScore)>=limit && Math.abs(s.homeScore-s.awayScore)>=2){
      if(s.homeScore>s.awayScore) homeSets++; else awaySets++
      s.finished=true; s.winner=s.homeScore>s.awayScore?'home':'away'
    }
  })

  const cur = sets.find(s=>!s.finished)||sets[sets.length-1]
  const last = events.length > 0 ? events[events.length-1] : null
  
  return {
    id: data?.id || 'match-live',
    tournament: data?.tournament || (LANG==='ar'?`مباراة مباشرة`:`Live Match`),
    homeClub: data?.homeClub || data?.home || { name_ar: 'Home', name_en: 'Home', color: '#14b8a6' },
    awayClub: data?.awayClub || data?.away || { name_ar: 'Away', name_en: 'Away', color: '#3b82f6' },
    homeSets: data?.homeSets !== undefined ? data.homeSets : homeSets,
    awaySets: data?.awaySets !== undefined ? data.awaySets : awaySets,
    currentHomeScore: data?.currentHomeScore !== undefined ? data.currentHomeScore : (cur?.homeScore||0),
    currentAwayScore: data?.currentAwayScore !== undefined ? data.currentAwayScore : (cur?.awayScore||0),
    currentSetNum: data?.currentSetNum !== undefined ? data.currentSetNum : (cur?.num||1),
    sets, events,
    status: data?.status || ((homeSets===3||awaySets===3)?'finished':'live'),
    lastUpdate: last?.recorded_at || data?.lastUpdate || new Date().toISOString(),
    refereeName: data?.refereeName || ''
  }
}

/* ── Poll Loop ────────────────────────────────────────────── */
function pollReferee(){
  if (!matchData && APP.selectedMatchId && window.currentLiveMatches) {
    const m = window.currentLiveMatches.find(x => x.id === APP.selectedMatchId);
    if (m) matchData = m;
  }
  const data = readRefereeData()
  const connected = isConnected()
  APP.refereeData = data

  // Connection badge
  const badge = document.getElementById('conn-badge')
  badge.className = `conn-badge ${connected?'on':'off'}`
  badge.textContent = connected ? T().connOn : T().connOff

  // Ref pulse
  const pulse = document.getElementById('ref-pulse')
  if(pulse){
    pulse.className = `ref-link-pulse ${connected?'active':'inactive'}`
    document.getElementById('ref-link-sub').textContent = connected ? T().refConnected : T().refDisconnected
  }

  // Activity feed
  if(data){
    const cur = data.events.length
    if(cur>APP.lastEventCount){
      data.events.slice(APP.lastEventCount).forEach(e=>{
        const pt = PT_META[e.point_type]||PT_META.other
        const side = e.scoring_side==='home'?CLUBS.home:CLUBS.away
        const sName = LANG==='ar'?side.name_ar:side.name_en
        const pNum = e.player_num ? ` #${e.player_num}` : ''
        APP.activityFeed.unshift({
          text:`${sName}${pNum} — ${ptLabel(e.point_type)} · ${e.home_score_after}:${e.away_score_after}`,
          color:pt.color,
          time:new Date(e.recorded_at).toLocaleTimeString(LANG==='ar'?'ar':'en',{hour:'2-digit',minute:'2-digit'}),
        })
        if(APP.activityFeed.length>30) APP.activityFeed.pop()
      })
      APP.lastEventCount = cur
    }
  }

  // Merge events with match document metadata for full context in detail view
  // If we have matchData (from document listener), use it. 
  // Otherwise, if we are in detail view and don't have it yet, buildMatch will show defaults
  const match = buildMatch({ ...matchData, events: window.eventsData })

  if(APP.currentView==='detail' && match)    renderDetail(match)
  if(APP.currentView==='dashboard' && match) renderDashboard(match)

  if(match){
    const d = new Date(match.lastUpdate)
    document.getElementById('last-update-txt').textContent =
      T().lastUpdate(d.toLocaleTimeString(LANG==='ar'?'ar':'en',{hour:'2-digit',minute:'2-digit',second:'2-digit'}))
  }
}

      const aName = LANG === 'ar' ? h.away.name_ar : h.away.name_en;
      const tName = LANG === 'ar' ? `مباراة — ${h.ageGroup}` : `Match — ${h.ageGroup}`;
      const d = new Date(h.dateFinished || h.date).toLocaleTimeString(LANG === 'ar' ? 'ar' : 'en', {hour:'2-digit', minute:'2-digit'});
      const statusText = LANG === 'ar' ? 'انتهت' : 'Finished';
      
      return `
        <div class="match-card" style="padding: 24px;">
          <div class="mc-header">
            <span class="mc-tournament">${tName}</span>
            <span class="mc-status finished">${statusText}</span>
          </div>
          <div style="display:flex; justify-content:center; align-items:center; gap:20px; padding:20px 0;">
            <div style="flex:1; text-align:right; font-weight:bold; font-size:18px;">${hName}</div>
            <div style="font-size:32px; font-weight:900; color:var(--teal); font-variant-numeric:tabular-nums; display:flex; gap:16px; align-items:center;">
              <span style="color:${h.home.color}">${h.score.split('-')[0].trim()}</span>
              <span style="color:var(--border); font-weight:300;">-</span>
              <span style="color:${h.away.color}">${h.score.split('-')[1].trim()}</span>
            </div>
            <div style="flex:1; text-align:left; font-weight:bold; font-size:18px;">${aName}</div>
          </div>
          <div class="mc-match-info" style="color:var(--text3); font-size:12px; margin-top:8px;">
            ${d}
          </div>
        </div>
      `;
    }).join('');
  } else {
    historyCards.innerHTML = `<div class="empty" style="grid-column:1/-1; padding:40px;"><div class="big">📅</div><p>${LANG==='ar'?'لا توجد مباريات سابقة':'No past matches'}</p></div>`;
  }
}

function matchCardHTML(m, isLive){
  if(!m) return ''
  const tr = T()
  const statusLabel = m.status==='live'?tr.statusLive:m.status==='finished'?tr.statusFinished:tr.statusScheduled
  const statusClass = m.status
  const hName = LANG==='ar'?(m.homeClub?.name_ar || 'Home'):(m.homeClub?.name_en || 'Home')
  const aName = LANG==='ar'?(m.awayClub?.name_ar || 'Away'):(m.awayClub?.name_en || 'Away')

  // Scoreboard HTML
  let hTotal=0, aTotal=0
  const setsHTML = [1,2,3,4,5].map(i=>{
    const s = m.sets.find(x=>x.num===i)
    if(s) { hTotal+=s.homeScore; aTotal+=s.awayScore }
    const hCls = (s&&s.winner==='home'?'won-h':'') + (s&&!s.finished&&s.num===m.currentSetNum?' active':'')
    const aCls = (s&&s.winner==='away'?'won-a':'') + (s&&!s.finished&&s.num===m.currentSetNum?' active':'')
    return {
      h: `<div class="mcs-set ${hCls}">${s?s.homeScore:'-'}</div>`,
      a: `<div class="mcs-set ${aCls}">${s?s.awayScore:'-'}</div>`
    }
  })

  const scoreboardHTML = `
    <div class="mc-scoreboard">
      <div class="mcs-row mcs-header">
        <div class="mcs-team">${tr.setsLabel||'SETS'}</div>
        ${[1,2,3,4,5].map(i=>`<div class="mcs-set">${i}</div>`).join('')}
        <div class="mcs-set mcs-total">T</div>
      </div>
      <div class="mcs-row">
        <div class="mcs-team">${hName} <span class="mcs-sets-won home">${m.homeSets}</span></div>
        ${setsHTML.map(x=>x.h).join('')}
        <div class="mcs-set mcs-total">${hTotal}</div>
      </div>
      <div class="mcs-row">
        <div class="mcs-team">${aName} <span class="mcs-sets-won away">${m.awaySets}</span></div>
        ${setsHTML.map(x=>x.a).join('')}
        <div class="mcs-set mcs-total">${aTotal}</div>
      </div>
    </div>`

  // Last event info
  const lastEvt = m.events[m.events.length-1]
  const lastInfo = lastEvt ? `${tr.set(m.currentSetNum)} · ${tr.pts(m.events.length)}` : ''

  return `<div class="match-card ${isLive?'is-live pulse-ring':''}" onclick="navigate('detail', '${m.id}')" style="padding:0">
    <div class="mc-header">
      <span class="mc-tournament">${m.tournament}</span>
      <span class="mc-status ${statusClass}">${statusLabel}</span>
    </div>
    ${scoreboardHTML}
    <div class="mc-match-info" style="display:flex; justify-content:space-between; padding:8px 16px">
      <span>${m.refereeName ? '👤 ' + m.refereeName : ''}</span>
      <span>${lastInfo}</span>
    </div>
  </div>`
}

        <div class="stat-bar" style="width:${hp}%;background:var(--teal);border-radius:3px 0 0 3px"></div>
        <div class="stat-bar" style="width:${ap}%;background:var(--blue);border-radius:0 3px 3px 0"></div>
      </div>
    </div>
    <span class="stat-val" style="color:var(--blue);min-width:20px">${away}</span>

}

/* ── Standings ────────────────────────────────────────────── */
function renderStandings(){
  const tr = T()
  document.getElementById('standings-head').innerHTML = `<tr>
    <th>#</th><th>${tr.standingsClub}</th><th>${tr.standingsPlayed}</th>
    <th>${tr.standingsWon}</th><th>${tr.standingsLost}</th>
    <th>${tr.standingsSets}</th><th>${tr.standingsPts}</th><th>${tr.standingsForm}</th>
  </tr>`

  // Calculate standings from finished matches
  const standingsMap = {};
  
  // 1. Initialize all clubs from matches (to ensure they appear even if 0 matches)
  const allMatches = [...(window.currentLiveMatches || []), ...(window.historyMatches || [])];
  allMatches.forEach(m => {
    [m.homeClub, m.awayClub].forEach(c => {
      if (!c) return;
      const name = LANG === 'ar' ? c.name_ar : c.name_en;
      if (!standingsMap[name]) {
        standingsMap[name] = { name, played: 0, w: 0, l: 0, sf: 0, sa: 0, pts: 0, form: [] };
      }
    });
  });

  // 2. Process finished matches
  (window.historyMatches || []).forEach(m => {
    const hName = LANG === 'ar' ? m.home?.name_ar : m.home?.name_en;
    const aName = LANG === 'ar' ? m.away?.name_ar : m.away?.name_en;
    if (!hName || !aName) return;

    if (!standingsMap[hName]) standingsMap[hName] = { name: hName, played: 0, w: 0, l: 0, sf: 0, sa: 0, pts: 0, form: [] };
    if (!standingsMap[aName]) standingsMap[aName] = { name: aName, played: 0, w: 0, l: 0, sf: 0, sa: 0, pts: 0, form: [] };

    const h = standingsMap[hName];
    const a = standingsMap[aName];

    h.played++; a.played++;
    h.sf += (m.homeSets || 0); h.sa += (m.awaySets || 0);
    a.sf += (m.awaySets || 0); a.sa += (m.homeSets || 0);

    // FIVB rules
    if ((m.homeSets || 0) > (m.awaySets || 0)) {
      h.w++; h.form.push('w');
      a.l++; a.form.push('l');
      h.pts += (m.homeSets === 3 && m.awaySets === 2) ? 2 : 3;
      a.pts += (m.homeSets === 3 && m.awaySets === 2) ? 1 : 0;
    } else {
      a.w++; a.form.push('w');
      h.l++; h.form.push('l');
      a.pts += (m.awaySets === 3 && m.homeSets === 2) ? 2 : 3;
      h.pts += (m.awaySets === 3 && m.homeSets === 2) ? 1 : 0;
    }
  });

  const data = Object.values(standingsMap)
    .sort((a,b) => b.pts - a.pts || (b.sf - b.sa) - (a.sf - a.sa) || b.sf - a.sf);


  document.getElementById('standings-body').innerHTML = data.map((c,i)=>`<tr>
    <td><span class="st-rank ${i===0?'r1':i===1?'r2':i===2?'r3':'rn'}">${i+1}</span></td>
    <td style="font-weight:600">${c.name}</td>
    <td>${c.played}</td><td>${c.w}</td><td>${c.l}</td>
    <td>${c.sf}/${c.sa}</td>
    <td style="font-weight:700;color:var(--teal)">${c.pts}</td>
    <td><div class="st-form">${c.form.slice(-5).map(f=>`<div class="sf-${f}">${f==='w'?tr.formW:tr.formL}</div>`).join('')}</div></td>
  </tr>`).join('')
}

/* ── Heartbeat ────────────────────────────────────────────── */
function demoHeartbeat(){

}

/* ── Init ─────────────────────────────────────────────────── */
  applyDir()

window.initFirestoreSync = function() {
  if (window.firebaseConfigured) {
    // Global history listener
    window.onSnapshotFirebaseDB(window.queryFirebaseDB(window.collectionFirebaseDB(window.db, 'matches'), window.whereFirebaseDB('status', '==', 'finished')), (snap) => {
      window.historyMatches = [];
      snap.forEach(d => window.historyMatches.push(d.data()));
      window.historyMatches.sort((a,b) => new Date(a.dateFinished || a.date) - new Date(b.dateFinished || b.date));
      pollReferee();
    });

    let currentLiveMatchId = null;

    window.activeListeners = {};

    function listenToMatch(matchId) {
      if (window.activeListeners[matchId]) {
        // If we already have the listener but matchData is missing, try to find it in the live matches list
        if (!matchData && window.currentLiveMatches) {
          const m = window.currentLiveMatches.find(x => x.id === matchId);
          if (m) {
            matchData = m; // This will provide immediate names/colors
            pollReferee();
          }
        }
        return;
      }
      
      // Try to get initial metadata from the home list to avoid "Loading..." flicker
      if (window.currentLiveMatches) {
        const m = window.currentLiveMatches.find(x => x.id === matchId);
        if (m) {
          matchData = m;
          pollReferee();
        }
      }

      window.activeListeners[matchId] = true;

      // Current Match config listener
      window.onSnapshotFirebaseDB(window.docFirebaseDB(window.db, 'matches', matchId), (doc) => {
        if(doc.exists()){
          const mData = doc.data();
          // If this is the match we are currently viewing in detail
          if (matchId === APP.selectedMatchId || matchId === URL_MATCH_ID) {
            matchData = mData;
            CLUBS.home = { ...matchData.home };
            CLUBS.away = { ...matchData.away };
            document.documentElement.style.setProperty('--teal', CLUBS.home.color);
            document.documentElement.style.setProperty('--blue', CLUBS.away.color);
          }
          pollReferee();
        }
      });

      // Match events listener
      window.onSnapshotFirebaseDB(window.queryFirebaseDB(window.collectionFirebaseDB(window.db, 'events'), window.whereFirebaseDB('matchId', '==', matchId)), (snap) => {
        const evts = [];
        snap.forEach(d => evts.push(d.data()));
        evts.sort((a,b) => new Date(a.recorded_at) - new Date(b.recorded_at));
        
        if (matchId === APP.selectedMatchId || matchId === URL_MATCH_ID) {
          window.eventsData = evts;
          pollReferee();
        }
      });

      // Referee heartbeat listener
      window.onSnapshotFirebaseDB(window.docFirebaseDB(window.db, 'referees', matchId), (doc) => {
        if(doc.exists() && (matchId === APP.selectedMatchId || matchId === URL_MATCH_ID)){
          window.lastHeartbeat = doc.data().lastActive;
        }
        pollReferee();
      });
    }

    // 1. Always listen to ALL live matches for the home view
    window.onSnapshotFirebaseDB(window.queryFirebaseDB(window.collectionFirebaseDB(window.db, 'matches'), window.whereFirebaseDB('status', '==', 'live')), (snap) => {
      const liveMatchesData = [];
      snap.forEach(d => {
        const mData = d.data();
        liveMatchesData.push(buildMatch({ id: d.id, events: [], ...mData })); 
      });
      window.currentLiveMatches = liveMatchesData;
      if(APP.currentView === 'home') renderHome(window.currentLiveMatches);
    });

    // 2. Always listen to ALL finished matches for history
    window.onSnapshotFirebaseDB(window.queryFirebaseDB(window.collectionFirebaseDB(window.db, 'matches'), window.whereFirebaseDB('status', '==', 'finished')), (snap) => {
      const historyData = [];
      snap.forEach(d => historyData.push({ id: d.id, ...d.data() }));
      window.historyMatches = historyData;
      if(APP.currentView === 'home') renderHome(window.currentLiveMatches); 
    });

    // 3. If a specific match is requested, listen to its details
    if (URL_MATCH_ID) {
      APP.selectedMatchId = URL_MATCH_ID;
      listenToMatch(URL_MATCH_ID);
    }
  }
}

// Robust initialization: Wait for Firebase to be ready
const initInterval = setInterval(() => {
  if (window.firebaseConfigured) {
    clearInterval(initInterval);
    window.initFirestoreSync();
  }
}, 500);

// Also try immediately just in case
if (window.firebaseConfigured) {
  clearInterval(initInterval);
  window.initFirestoreSync();
}
